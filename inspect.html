<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision PoC Inspect v18 Capture Fit</title>
<style>
:root{--cyan:#31d7ff;--ok:#27f58a;--bad:#ff516b;--warn:#ffe45e}*{box-sizing:border-box}body{margin:0;background:#000;color:#eef6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}#stage{position:fixed;inset:0;background:#000}video,#snap,#ref,#hud{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}#snap{display:none}#ref{opacity:.34;mix-blend-mode:screen;pointer-events:none}#hud{pointer-events:none}.topbar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;gap:8px;padding:10px;background:linear-gradient(#000c,#0000);align-items:center}.panel{position:fixed;left:10px;bottom:10px;z-index:5;background:#071225dd;border:1px solid #29436d;border-radius:14px;padding:10px;min-width:320px;max-width:440px}.score{font-size:38px;font-weight:900;line-height:1}.phase{font-size:18px;color:#dff8ff;font-weight:800}.small{font-size:12px;color:#bcd0f7}.ok{color:var(--ok)}.ng{color:var(--bad)}.warn{color:var(--warn)}button,select{border:1px solid #31517e;background:#071226;color:#eef6ff;border-radius:12px;padding:10px 12px;font-size:15px}button{font-weight:800;background:linear-gradient(90deg,#2aa7ff,#39e0ff);color:#001225;border:0}.ghost{background:#26395f;color:#fff}.fullOK{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,255,80,.42);z-index:10;font-size:120px;font-weight:1000;color:white;text-shadow:0 8px 24px #000}.plist{margin-top:6px;max-height:190px;overflow:auto}.pitem{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #29436d;padding:5px 0;font-size:13px}.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#22365f;margin-left:6px;font-size:12px}.capture{background:#3e2f08;color:#ffe45e}@media(max-width:700px){.topbar{flex-wrap:wrap}.panel{right:10px}.score{font-size:30px}.fullOK{font-size:76px}}
</style></head><body>
<div id="stage"><video id="cam" autoplay playsinline muted></video><canvas id="snap"></canvas><img id="ref"><canvas id="hud"></canvas></div>
<div class="topbar"><select id="partSelect"><option value="">マスター選択</option></select><button id="startBtn">カメラ起動</button><button id="topBtn" class="ghost">上面</button><button id="frontBtn" class="ghost">正面</button><button id="retryBtn" class="ghost">再検査</button><button id="reloadBtn" class="ghost">再読込</button></div>
<div class="panel"><div class="phase" id="phase">未選択</div><div class="score" id="score">--%</div><div class="small" id="info">v18：ざっくり合ったら自動撮影 → 静止画で局所フィッティング → ポイント判定</div><div class="plist" id="plist"></div></div><div class="fullOK" id="fullOK">OK</div>
<script>
const DB_KEY='visionPocMasters.hybrid.v18';
const FALLBACK_KEY='visionPocMasters.hybrid.v17';
const TRACK_THRESHOLD=62;       // ざっくり捕まえる閾値
const TRACK_HOLD_FRAMES=8;      // 連続何フレームで撮影するか
const POINT_THRESHOLD=58;       // 本検査の各ポイント閾値
const $=id=>document.getElementById(id);const video=$('cam'),snap=$('snap'),ref=$('ref'),hud=$('hud'),hctx=hud.getContext('2d');
let db={},current=null,phase='top',loopId=null,refImg=new Image(),state='idle',hold=0,hiddenCanvas=document.createElement('canvas'),hiddenCtx=hiddenCanvas.getContext('2d');
function getDB(){try{let d=JSON.parse(localStorage.getItem(DB_KEY)||'{}'); if(!Object.keys(d).length)d=JSON.parse(localStorage.getItem(FALLBACK_KEY)||'{}'); return d;}catch(e){return {}}}
function loadList(){db=getDB();const sel=$('partSelect');sel.innerHTML='<option value="">マスター選択</option>'+Object.keys(db).map(k=>`<option value="${k}">${k}</option>`).join('')}loadList();$('reloadBtn').onclick=loadList;
$('partSelect').onchange=()=>{const k=$('partSelect').value;if(!k)return;current=db[k];phase='top';loadPhase();resetCapture()};$('topBtn').onclick=()=>{phase='top';loadPhase();resetCapture()};$('frontBtn').onclick=()=>{phase='front';loadPhase();resetCapture()};$('retryBtn').onclick=resetCapture;
function srcForPhase(){return current?.images?.[phase]||current?.images?.top||''}function pointRects(){return current?.points?.[phase]||[]}
function loadPhase(){if(!current)return;const src=srcForPhase();ref.src=src;refImg.onload=()=>drawHud([]);refImg.src=src;$('phase').textContent=(phase==='top'?'上面':'正面')+' / 位置合わせ中 / '+current.partNo;$('info').textContent='TRACKINGが'+TRACK_THRESHOLD+'%を超えて安定したら自動撮影します。';renderPointList([])}
async function startCamera(){const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=stream;tick()}$('startBtn').onclick=startCamera;
function resetCapture(){state='tracking';hold=0;snap.style.display='none';video.style.display='block';$('score').className='score';if(current)loadPhase()}
function fitRect(imgW,imgH,cw,ch){const s=Math.max(cw/imgW,ch/imgH);const w=imgW*s,h=imgH*s;return{x:(cw-w)/2,y:(ch-h)/2,w,h,s}}
function tick(){cancelAnimationFrame(loopId);const run=()=>{if(current&&video.videoWidth&&state!=='result')analyzeTracking();loopId=requestAnimationFrame(run)};run()}
function drawVideoToHidden(){hiddenCanvas.width=900;hiddenCanvas.height=650;hiddenCtx.drawImage(video,0,0,hiddenCanvas.width,hiddenCanvas.height)}
function analyzeTracking(){hud.width=innerWidth;hud.height=innerHeight;drawVideoToHidden();const pts=pointRects();const results=pts.map(p=>quickComparePoint(p,hiddenCanvas));const avg=results.length?Math.round(results.reduce((a,b)=>a+b.score,0)/results.length):0;$('score').textContent=(results.length?avg:'--')+'%';$('score').className='score '+(avg>=TRACK_THRESHOLD?'warn':'ng');$('phase').textContent=(phase==='top'?'上面':'正面')+' / 位置合わせ中 '+(avg>=TRACK_THRESHOLD?`📸 ${hold+1}/${TRACK_HOLD_FRAMES}`:'')+' / '+current.partNo;drawHud(results,false);renderPointList(results);
 if(results.length&&avg>=TRACK_THRESHOLD){hold++; if(hold>=TRACK_HOLD_FRAMES)captureAndInspect()} else hold=0;}
function captureAndInspect(){state='captured';hold=0;drawVideoToHidden();snap.width=hiddenCanvas.width;snap.height=hiddenCanvas.height;snap.getContext('2d').drawImage(hiddenCanvas,0,0);snap.style.display='block';video.style.display='none';$('phase').textContent=(phase==='top'?'上面':'正面')+' / 静止画フィッティング中 / '+current.partNo;setTimeout(()=>inspectStill(),30)}
function inspectStill(){const pts=pointRects();const results=pts.map(p=>fitAndComparePoint(p,snap));const pass=results.filter(r=>r.score>=POINT_THRESHOLD).length;const avg=results.length?Math.round(results.reduce((a,b)=>a+b.score,0)/results.length):0;$('score').textContent=(results.length?avg:'--')+'%';$('score').className='score '+(results.length&&pass===results.length?'ok':'ng');$('phase').textContent=(phase==='top'?'上面':'正面')+' / 本検査結果 / '+current.partNo;drawHud(results,true);renderPointList(results);state='result';if(results.length&&pass===results.length)autoOK();}
function quickComparePoint(p,canvas){const live=edgeForRect(canvas,p.x,p.y,p.w,p.h,48);const tpl=p.template;const score=edgeSimilarity(tpl.vec,live.vec,tpl.density,live.density);return{name:p.name,rect:p,score,threshold:TRACK_THRESHOLD,density:live.density,dx:0,dy:0,quick:true}}
function fitAndComparePoint(p,canvas){let best={score:-1,dx:0,dy:0,live:null};const tpl=p.template;for(let dy=-24;dy<=24;dy+=6){for(let dx=-24;dx<=24;dx+=6){const live=edgeForRect(canvas,p.x+dx,p.y+dy,p.w,p.h,48);const score=edgeSimilarity(tpl.vec,live.vec,tpl.density,live.density);if(score>best.score)best={score,dx,dy,live};}}return{name:p.name,rect:p,score:best.score,threshold:POINT_THRESHOLD,density:best.live?.density||0,dx:best.dx,dy:best.dy,quick:false}}
function edgeForRect(canvas,x,y,w,h,size){const c=document.createElement('canvas');c.width=size;c.height=size;const ctx=c.getContext('2d');ctx.drawImage(canvas,x,y,w,h,0,0,size,size);return makeEdgeVector(ctx.getImageData(0,0,size,size),size,size)}
function makeEdgeVector(imgData,w,h){const d=imgData.data,gray=new Float32Array(w*h);for(let i=0,j=0;i<d.length;i+=4,j++)gray[j]=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];let v='',sum=0;for(let y=1;y<h-1;y++){for(let x=1;x<w-1;x++){const i=y*w+x;const gx=-gray[i-w-1]-2*gray[i-1]-gray[i+w-1]+gray[i-w+1]+2*gray[i+1]+gray[i+w+1];const gy=-gray[i-w-1]-2*gray[i-w]-gray[i-w+1]+gray[i+w-1]+2*gray[i+w]+gray[i+w+1];const mag=Math.sqrt(gx*gx+gy*gy);const bit=mag>55?1:0;v+=bit?'1':'0';sum+=bit}}return{vec:v,density:sum/Math.max(1,v.length)}}
function edgeSimilarity(a,b,da,db){let inter=0,union=0;const n=Math.min(a.length,b.length);for(let i=0;i<n;i++){const A=a[i]==='1',B=b[i]==='1';if(A&&B)inter++;if(A||B)union++;}const j=union?inter/union:0;const densityPenalty=Math.max(0,1-Math.abs((da||0)-(db||0))*3.0);const score=(j*0.82+densityPenalty*0.18)*100;return Math.round(Math.max(0,Math.min(100,score)))}
function drawHud(results,finalMode=false){hud.width=innerWidth;hud.height=innerHeight;hctx.clearRect(0,0,hud.width,hud.height);const fit=fitRect(900,650,hud.width,hud.height);for(const p of pointRects()){const r=results.find(x=>x.name===p.name);const ok=r&&r.score>=r.threshold;hctx.strokeStyle=r?(ok?'#27f58a':'#ff516b'):'#ffe45e';hctx.lineWidth=finalMode?7:4;hctx.setLineDash(finalMode?[]:[10,7]);const rx=p.x+(r?.dx||0),ry=p.y+(r?.dy||0);const x=fit.x+(rx/900)*fit.w,y=fit.y+(ry/650)*fit.h,w=(p.w/900)*fit.w,h=(p.h/650)*fit.h;hctx.strokeRect(x,y,w,h);hctx.setLineDash([]);hctx.font='18px system-ui';hctx.fillStyle=hctx.strokeStyle;hctx.fillText((p.name||'point')+(r?' '+r.score+'%':''),x+6,Math.max(24,y-8)); if(finalMode&&r&&!ok){hctx.beginPath();hctx.arc(x+w/2,y+h/2,Math.max(22,Math.min(w,h)/2),0,Math.PI*2);hctx.strokeStyle='#ff1744';hctx.lineWidth=8;hctx.stroke();}}
}
function renderPointList(results){$('plist').innerHTML=pointRects().map(p=>{const r=results.find(x=>x.name===p.name);const s=r?r.score:'--';const ok=r&&r.score>=r.threshold;const d=r&&!r.quick?` <span class="badge">fit ${r.dx},${r.dy}</span>`:'';return`<div class="pitem"><span>${p.name}${d}</span><b class="${ok?'ok':'ng'}">${s}%</b></div>`}).join('')}
function autoOK(){$('fullOK').style.display='flex';setTimeout(()=>{$('fullOK').style.display='none';if(phase==='top'&&(current.images?.front)){phase='front';loadPhase();resetCapture()}else{$('phase').textContent='最終OK / '+current.partNo;state='result'}},850)}
window.addEventListener('resize',()=>drawHud([]));
</script></body></html>

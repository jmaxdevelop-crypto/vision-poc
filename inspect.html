<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Vision PoC v20 Inspect / 基準点方式</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#020711;color:#eef6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}.topbar{position:fixed;left:0;right:0;top:0;z-index:5;background:rgba(5,12,25,.85);border-bottom:1px solid #29436d;padding:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}select,button{border:1px solid #31517e;border-radius:12px;background:#071226;color:#eef6ff;padding:10px 12px;font-size:15px}button{font-weight:800;background:linear-gradient(90deg,#2aa7ff,#39e0ff);color:#001225;border:0}.stage{position:fixed;inset:0;background:#000}video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.hud{position:fixed;left:10px;right:10px;bottom:10px;z-index:6;background:rgba(5,12,25,.78);border:1px solid #29436d;border-radius:16px;padding:12px}.big{font-size:20px;font-weight:900}.small{font-size:12px;color:#a9bde6}.pill{display:inline-block;margin:4px 6px 0 0;border-radius:999px;padding:6px 10px;font-weight:800}.base{background:#ffd84a;color:#1b1000}.inspect{background:#ff4a6a;color:#fff}.ok{background:#35ff8b;color:#00220d}.warn{background:#ff4a6a;color:#fff}.overlayMsg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:10;font-size:22vw;font-weight:1000;background:rgba(0,255,80,.38);color:#fff;text-shadow:0 0 20px #003}
</style>
</head>
<body>
<div class="stage"><video id="video" autoplay playsinline muted></video><canvas id="overlay" width="1280" height="720"></canvas></div>
<div class="topbar"><select id="partSel"><option value="">品番選択</option></select><button id="camBtn">カメラ起動</button><button id="viewBtn">上面</button><button id="okBtn">この面OK</button></div>
<div class="hud"><div class="big" id="title">未読込</div><div class="small">v20は自動判定ではなく、基準点と検査点をCADガイド表示する安定版。まず座標・共有・現場導線確認用。</div><div id="chips"></div></div><div class="overlayMsg" id="done">OK</div>
<script>
const DB_KEY='visionPocV20FeatureMaster'; const $=id=>document.getElementById(id); let db={}, current=null, view='top', topOK=false;
function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return {}}}
function loadList(){db=getDB(); const keys=Object.keys(db); $('partSel').innerHTML='<option value="">品番選択</option>'+keys.map(k=>`<option value="${k}">${k}</option>`).join(''); if(!keys.length){$('title').textContent='マスター未登録：master_v20で登録/JSON読込してください';}}
$('partSel').onchange=()=>{current=db[$('partSel').value]; topOK=false; view='top'; draw();};
$('viewBtn').onclick=()=>{view=view==='top'?'front':'top'; draw();};
$('okBtn').onclick=()=>{if(!current)return; if(view==='top' && (current.points.front||[]).length){topOK=true; view='front'; draw();} else showOK();};
async function startCam(){const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false}); $('video').srcObject=s;}
$('camBtn').onclick=startCam;
function map(p){const c=$('overlay'), W=c.width,H=c.height; const s=Math.min(W,H)*.82; return {x:W/2+(p.x-.5)*s,y:H/2+(p.y-.5)*s};}
function draw(){const c=$('overlay'),ctx=c.getContext('2d'); c.width=innerWidth*devicePixelRatio; c.height=innerHeight*devicePixelRatio; ctx.clearRect(0,0,c.width,c.height); if(!current){loadList();return;} const segs=(current.segments&&current.segments[view])||[]; ctx.strokeStyle='rgba(49,215,255,.82)'; ctx.lineWidth=2*devicePixelRatio; ctx.beginPath(); segs.forEach(s=>{const a=map({x:s.x1,y:s.y1}),b=map({x:s.x2,y:s.y2}); ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y)}); ctx.stroke(); const pts=(current.points&&current.points[view])||[]; pts.forEach((p,i)=>{const m=map(p); ctx.beginPath(); ctx.arc(m.x,m.y,(p.type==='base'?10:14)*devicePixelRatio,0,Math.PI*2); ctx.fillStyle=p.type==='base'?'rgba(255,216,74,.9)':'rgba(255,74,106,.95)'; ctx.fill(); ctx.fillStyle='#fff'; ctx.font=`${14*devicePixelRatio}px system-ui`; ctx.fillText(p.name||p.type,m.x+14*devicePixelRatio,m.y-10*devicePixelRatio);}); $('viewBtn').textContent=view==='top'?'上面':'正面'; $('title').textContent=`${current.partNo} / ${view==='top'?'上面':'正面'}`; $('chips').innerHTML=pts.map(p=>`<span class="pill ${p.type==='base'?'base':'inspect'}">${p.type==='base'?'基準':'検査'} ${p.name}</span>`).join('');}
function showOK(){const d=$('done');d.style.display='flex';setTimeout(()=>d.style.display='none',1600)}
window.addEventListener('resize',draw); loadList(); draw();
</script>
</body></html>

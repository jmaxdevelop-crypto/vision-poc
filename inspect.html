<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision PoC Inspect v11</title><style>
:root{--cyan:#31d7ff;--red:#ff365f;--green:#37ff91}*{box-sizing:border-box}body{margin:0;background:#030812;color:#eef6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}.topbar{position:fixed;left:0;right:0;top:0;z-index:20;background:#071225dd;border-bottom:1px solid #29436d;padding:10px;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}input,button{border-radius:12px;border:1px solid #31517e;background:#071226;color:#eef6ff;padding:10px;font-size:15px}button{font-weight:800;background:#26395f}button.primary{background:linear-gradient(90deg,#2aa7ff,#39e0ff);color:#001225;border:0}.stage{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.cadBox{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}.overlay{display:block;width:100%;height:auto;filter:drop-shadow(0 0 8px rgba(49,215,255,.8));mix-blend-mode:screen}.point{position:absolute;width:42px;height:42px;border:4px solid var(--red);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 18px rgba(255,54,95,.9);pointer-events:none}.segLayer{position:absolute;inset:0;pointer-events:none}.hud{position:fixed;left:12px;right:12px;bottom:12px;z-index:30;background:#071225dd;border:1px solid #29436d;border-radius:18px;padding:12px}.big{font-size:26px;font-weight:900}.muted{color:#9fb4d9;font-size:13px}.okFlash,.ngFlash{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;font-size:100px;font-weight:1000}.okFlash{background:rgba(0,255,90,.45)}.ngFlash{background:rgba(255,0,50,.45)}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.sl{display:flex;gap:8px;align-items:center}.sl input{width:100%}.pointsText{color:#ffd4dc;margin-top:6px;font-weight:800}.warn{color:#ffb6c4}@media(max-width:700px){.topbar{grid-template-columns:1fr}.big{font-size:22px}.okFlash,.ngFlash{font-size:70px}}
</style></head><body>
<div class="topbar"><input id="partNo" placeholder="品番入力"><button id="loadBtn" class="primary">読込</button><button id="camBtn">カメラ起動</button><input id="importInput" type="file" accept=".json,application/json"></div>
<div class="stage"><video id="cam" autoplay playsinline muted></video><div id="cadBox" class="cadBox"><img id="cad" class="overlay"><svg id="segSvg" class="segLayer" viewBox="0 0 1 1" preserveAspectRatio="none"></svg><div id="pts"></div></div></div>
<div class="hud"><div class="big" id="phase">上面検査</div><div class="muted" id="info">マスターJSON読込 → 品番読込 → カメラ起動</div><div class="pointsText" id="pointsText"></div><div class="controls"><div class="sl">大きさ<input id="scale" type="range" min="50" max="260" value="145"></div><div class="sl">濃さ<input id="alpha" type="range" min="15" max="100" value="80"></div><button id="manualOk" class="primary">手動OK / 次へ</button><button id="manualNg">NG表示</button></div></div>
<div id="ok" class="okFlash">OK</div><div id="ng" class="ngFlash">NG</div>
<script>
const DB_KEYS=['visionPocMasters.v11','visionPocMasters.v10','visionPocMasters.v9']; const $=id=>document.getElementById(id); let master=null,phase='top';
function getDB(){for(const k of DB_KEYS){try{const v=localStorage.getItem(k); if(v)return JSON.parse(v)}catch(e){}} return {}} function saveDB(db){localStorage.setItem(DB_KEYS[0],JSON.stringify(db))} function setInfo(s){$('info').textContent=s}
$('importInput').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;saveDB(JSON.parse(await f.text()));setInfo('JSON読込OK。品番を入れて読込。')});
$('loadBtn').onclick=()=>{const pn=$('partNo').value.trim();const db=getDB();master=db[pn];if(!master){alert('マスターなし: '+pn);return}phase='top';showPhase();setInfo('読込OK: '+pn)};
$('camBtn').onclick=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});$('cam').srcObject=stream}catch(e){alert('カメラ起動失敗: '+e.message)}};
function currentView(){const side=master?.sideChoice==='side'?'side':'front';return phase==='top'?'top':side} function viewName(v){return v==='top'?'上面':v==='front'?'正面':'側面'}
function showPhase(){if(!master)return;const v=currentView();$('cad').src=master[v];$('phase').textContent=viewName(v)+'検査';applyOverlay();drawPoints();setTimeout(drawPoints,80)}
function applyOverlay(){const s=Number($('scale').value), a=Number($('alpha').value)/100;$('cadBox').style.width=s+'vw';$('cad').style.opacity=a;drawPoints()} $('scale').oninput=applyOverlay;$('alpha').oninput=applyOverlay;
function drawPoints(){const box=$('pts'), svg=$('segSvg');box.innerHTML='';svg.innerHTML='';if(!master)return;const v=currentView();const pts=(master.points||[]).filter(p=>p.view===v); pts.forEach((p,idx)=>{const el=document.createElement('div');el.className='point';el.style.left=(p.x*100)+'%';el.style.top=(p.y*100)+'%';el.title=p.name;box.appendChild(el); (p.segments||[]).forEach(s=>{const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',s[0]);line.setAttribute('y1',s[1]);line.setAttribute('x2',s[2]);line.setAttribute('y2',s[3]);line.setAttribute('stroke','#ff365f');line.setAttribute('stroke-width','0.006');line.setAttribute('stroke-linecap','round');line.setAttribute('opacity','0.85');svg.appendChild(line)})}); $('pointsText').innerHTML=pts.length?('重点確認: '+pts.map(p=>p.name).join(' / ')):'<span class="warn">重点ポイントなし</span>'}
new ResizeObserver(drawPoints).observe($('cadBox'));
function flash(id,text){const el=$(id);el.textContent=text;el.style.display='flex';setTimeout(()=>el.style.display='none',900)} $('manualOk').onclick=()=>{if(!master){alert('先に品番を読込');return} if(phase==='top'){flash('ok','上面OK');phase='side';setTimeout(showPhase,650)}else{flash('ok','最終OK');setInfo('上面＋'+viewName(currentView())+' OK')}}; $('manualNg').onclick=()=>flash('ng','NG');
setInfo('v11：登録ポイントの赤丸＋選択線分を検査画面にも表示します。');
</script></body></html>

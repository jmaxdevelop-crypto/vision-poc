<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision PoC Inspect v16</title>
<style>
:root{--cyan:#31d7ff;--ok:#27f58a;--bad:#ff516b;--warn:#ffe45e}*{box-sizing:border-box}body{margin:0;background:#000;color:#eef6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}#stage{position:fixed;inset:0;background:#000}video,#ref,#work,#hudCanvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}#ref{opacity:.42;mix-blend-mode:screen;pointer-events:none}#work{display:none}#hudCanvas{pointer-events:none}.topbar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;gap:8px;padding:10px;background:linear-gradient(#000b,#0000);align-items:center}.panel{position:fixed;left:10px;bottom:10px;z-index:5;background:#071225dd;border:1px solid #29436d;border-radius:14px;padding:10px;min-width:280px}.score{font-size:38px;font-weight:900;line-height:1}.phase{font-size:18px;color:#dff8ff}.small{font-size:12px;color:#bcd0f7}.ok{color:var(--ok)}.ng{color:var(--bad)}button,select,input{border:1px solid #31517e;background:#071226;color:#eef6ff;border-radius:12px;padding:10px 12px;font-size:15px}button{font-weight:800;background:linear-gradient(90deg,#2aa7ff,#39e0ff);color:#001225;border:0}.ghost{background:#26395f;color:#fff}.fullOK{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,255,80,.42);z-index:10;font-size:120px;font-weight:1000;color:white;text-shadow:0 8px 24px #000}.fullNG{position:fixed;right:10px;top:70px;z-index:6;background:#ff516bcc;color:#fff;border-radius:16px;padding:12px 18px;font-weight:900;display:none}.plist{margin-top:6px;max-height:160px;overflow:auto}.pitem{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #29436d;padding:5px 0;font-size:13px}@media(max-width:700px){.topbar{flex-wrap:wrap}.panel{right:10px}.score{font-size:30px}.fullOK{font-size:76px}}
</style></head><body>
<div id="stage"><video id="cam" autoplay playsinline muted></video><img id="ref"><canvas id="work"></canvas><canvas id="hudCanvas"></canvas></div>
<div class="topbar"><select id="partSelect"><option value="">マスター選択</option></select><button id="startBtn">カメラ起動</button><button id="topBtn" class="ghost">上面</button><button id="frontBtn" class="ghost">正面</button><button id="reloadBtn" class="ghost">再読込</button></div>
<div class="panel"><div class="phase" id="phase">未選択</div><div class="score" id="score">--%</div><div class="small" id="info">マスターを選んでください</div><div class="plist" id="plist"></div></div><div class="fullOK" id="fullOK">OK</div><div class="fullNG" id="fullNG">NG POINT</div>
<script>
const DB_KEY='visionPocMasters.hybrid.v15'; const $=id=>document.getElementById(id); const video=$('cam'), ref=$('ref'), hud=$('hudCanvas'), hctx=hud.getContext('2d'), work=$('work'), wctx=work.getContext('2d');
let db={}, current=null, phase='top', loopId=null, refImg=new Image(), lastOK=false;
function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return {}}}
function loadList(){db=getDB(); const sel=$('partSelect'); sel.innerHTML='<option value="">マスター選択</option>'+Object.keys(db).map(k=>`<option value="${k}">${k} / ${db[k].type||''}</option>`).join('')} loadList(); $('reloadBtn').onclick=loadList;
$('partSelect').onchange=()=>{const k=$('partSelect').value; if(!k)return; current=db[k]; phase='top'; loadPhase();}; $('topBtn').onclick=()=>{phase='top';loadPhase()}; $('frontBtn').onclick=()=>{phase='front';loadPhase()};
function srcForPhase(){if(!current)return null; if(current.type==='cad')return current.cad?.[phase]; return current.images?.[phase]||current.images?.top}
function loadPhase(){if(!current)return; const src=srcForPhase(); ref.src=src||''; refImg.onload=()=>drawHud([]); refImg.src=src||''; $('phase').textContent=(phase==='top'?'上面':'正面')+'検査 / '+current.partNo; $('info').textContent=current.memo||''; renderPointList([]);}
async function startCamera(){const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false}); video.srcObject=stream; tick()} $('startBtn').onclick=startCamera;
function fitRect(imgW,imgH,cw,ch){const s=Math.max(cw/imgW,ch/imgH); const w=imgW*s,h=imgH*s; return {x:(cw-w)/2,y:(ch-h)/2,w,h,s}}
function pointRects(){return (current?.points?.[phase]||[])}
function tick(){cancelAnimationFrame(loopId); const run=()=>{if(current&&video.videoWidth){analyze()} loopId=requestAnimationFrame(run)}; run()}
function analyze(){hud.width=innerWidth;hud.height=innerHeight; work.width=240;work.height=160; wctx.drawImage(video,0,0,work.width,work.height); const pts=pointRects(); let results=[]; if(refImg.complete&&refImg.naturalWidth){const fit=fitRect(refImg.naturalWidth,refImg.naturalHeight,work.width,work.height); const tmp=document.createElement('canvas'); tmp.width=work.width;tmp.height=work.height; const t=tmp.getContext('2d'); t.drawImage(refImg,fit.x,fit.y,fit.w,fit.h); for(const p of pts){results.push(compareRect(p,t,fit))}} const avg=results.length?Math.round(results.reduce((a,b)=>a+b.score,0)/results.length):0; $('score').textContent=(results.length?avg:'--')+'%'; $('score').className='score '+(avg>=72?'ok':'ng'); drawHud(results); renderPointList(results); if(avg>=78&&results.length){autoOK()} }
function compareRect(p,refCtx,fit){const rx=Math.round((p.x/900)*work.width), ry=Math.round((p.y/650)*work.height), rw=Math.max(6,Math.round((p.w/900)*work.width)), rh=Math.max(6,Math.round((p.h/650)*work.height)); let a=wctx.getImageData(rx,ry,rw,rh).data, b=refCtx.getImageData(rx,ry,rw,rh).data; let diff=0,n=0; for(let i=0;i<a.length;i+=16){const ga=(a[i]+a[i+1]+a[i+2])/3, gb=(b[i]+b[i+1]+b[i+2])/3; diff+=Math.abs(ga-gb); n++} let score=Math.max(0,Math.min(100,100-(diff/(n||1))*0.55)); return {name:p.name,rect:p,score:Math.round(score)}}
function drawHud(results){hud.width=innerWidth;hud.height=innerHeight; hctx.clearRect(0,0,hud.width,hud.height); if(!refImg.naturalWidth)return; const fit=fitRect(refImg.naturalWidth,refImg.naturalHeight,hud.width,hud.height); const pts=pointRects(); for(const p of pts){const r=results.find(x=>x.name===p.name); const ok=r&&r.score>=72; hctx.strokeStyle=r?(ok?'#27f58a':'#ff516b'):'#ffe45e'; hctx.lineWidth=4; hctx.setLineDash([10,7]); const x=fit.x+(p.x/900)*fit.w, y=fit.y+(p.y/650)*fit.h, w=(p.w/900)*fit.w, h=(p.h/650)*fit.h; hctx.strokeRect(x,y,w,h); hctx.setLineDash([]); hctx.font='18px system-ui'; hctx.fillStyle=hctx.strokeStyle; hctx.fillText((p.name||'point')+(r?' '+r.score+'%':''),x+6,Math.max(24,y-8));}}
function renderPointList(results){$('plist').innerHTML=pointRects().map(p=>{const r=results.find(x=>x.name===p.name); const s=r?r.score:'--'; const ok=r&&r.score>=72; return `<div class="pitem"><span>${p.name}</span><b class="${ok?'ok':'ng'}">${s}%</b></div>`}).join('')}
function autoOK(){ if(lastOK)return; lastOK=true; $('fullOK').style.display='flex'; setTimeout(()=>{$('fullOK').style.display='none'; if(phase==='top' && (current.images?.front||current.cad?.front)){phase='front';loadPhase()} else {$('phase').textContent='最終OK / '+current.partNo} setTimeout(()=>lastOK=false,1000)},900)}
window.addEventListener('resize',()=>drawHud([]));
</script></body></html>

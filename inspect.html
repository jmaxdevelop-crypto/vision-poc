<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Vision PoC Inspect v19</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020711;color:#eef6ff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}#start{position:fixed;inset:0;background:#071225;z-index:20;display:flex;align-items:center;justify-content:center;padding:20px}.panel{width:min(520px,95vw);background:#101c34;border:1px solid #29436d;border-radius:20px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.45)}h1{margin:0 0 12px;font-size:24px}select,button,input{width:100%;padding:15px;border-radius:14px;border:1px solid #31517e;background:#071226;color:#eef6ff;font-size:18px;margin-top:10px}button{border:0;background:linear-gradient(90deg,#2aa7ff,#39e0ff);color:#001225;font-weight:900}#stage{position:fixed;inset:0;background:#000}video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.hud{position:fixed;left:12px;right:12px;top:12px;z-index:5;display:flex;gap:8px;align-items:center;justify-content:space-between}.pill{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:10px 14px;font-weight:900}.phase{font-size:18px;color:#31d7ff}.score{font-size:20px;color:#ffd23f}.bottom{position:fixed;left:12px;right:12px;bottom:12px;z-index:5;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:10px}.row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);padding:6px 0}.ok{color:#28e070}.ng{color:#ff4d6d}.wait{color:#ffd23f}#result{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;font-size:110px;font-weight:1000;background:rgba(0,255,80,.45);text-shadow:0 4px 20px #000}#result.ng{background:rgba(255,0,50,.45)}.small{font-size:12px;color:#9fb4d9;line-height:1.5}.hidden{display:none!important}
</style></head><body>
<div id="start"><div class="panel"><h1>Inspect v19</h1><div class="small">品番を選ぶと、マスターの「側面検査ON/OFF」に従って自動で工程切替します。</div><select id="partList"></select><button id="startBtn">検査開始</button><label class="small">JSON読込</label><input id="importInput" type="file" accept=".json,application/json"><div id="info" class="small"></div></div></div>
<div id="stage"><video id="cam" autoplay playsinline muted></video><canvas id="overlay" width="1280" height="720"></canvas><canvas id="work" width="640" height="360" class="hidden"></canvas></div>
<div class="hud"><div class="pill phase" id="phase">TOP</div><div class="pill score" id="tracking">TRACKING --%</div></div><div class="bottom" id="pointBox"></div><div id="result">OK</div>
<script>
const DB_KEY='visionPocMasters.v19';const $=id=>document.getElementById(id);let db={},master=null,phase='top',stream=null,overlayImg=null,frontImg=null,topImg=null,okFrames=0,captured=false;
function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return {}}}
function setDB(v){localStorage.setItem(DB_KEY,JSON.stringify(v))}
function fillList(){db=getDB();const keys=Object.keys(db);$('partList').innerHTML=keys.length?keys.map(k=>`<option value="${k}">${k} / ${db[k].useSideCheck?'上面+正面':'上面のみ'}</option>`).join(''):'<option>マスターなし</option>';showInfo()}
$('partList').onchange=showInfo;function showInfo(){const m=db[$('partList').value];$('info').textContent=m?`${m.type||''} / 側面検査:${m.useSideCheck?'ON':'OFF'} / 上面${(m.pointsTop||[]).length}点 正面${(m.pointsFront||[]).length}点`:''}
$('importInput').onchange=async e=>{const f=e.target.files?.[0];if(!f)return;setDB(JSON.parse(await f.text()));fillList()};fillList();
$('startBtn').onclick=async()=>{master=db[$('partList').value];if(!master){alert('マスターなし');return}$('start').style.display='none';topImg=await loadImg(master.top);frontImg=master.front?await loadImg(master.front):null;phase='top';overlayImg=topImg;captured=false;okFrames=0;await startCam();loop()};
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=src})}
async function startCam(){stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});$('cam').srcObject=stream}
function loop(){drawOverlay();const tr=estimateTracking();$('tracking').textContent='TRACKING '+Math.round(tr*100)+'%'; if(!captured){ if(tr>.55) okFrames++; else okFrames=0; if(okFrames>10){captured=true;runInspection();return;} requestAnimationFrame(loop);} }
function drawOverlay(){const c=$('overlay'),ctx=c.getContext('2d');const w=c.width,h=c.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,0,w,h); if(overlayImg){ctx.globalAlpha=.38; const s=Math.min(w/overlayImg.width,h/overlayImg.height);const dw=overlayImg.width*s,dh=overlayImg.height*s;ctx.drawImage(overlayImg,(w-dw)/2,(h-dh)/2,dw,dh);ctx.globalAlpha=1;} const pts=phase==='top'?(master.pointsTop||[]): (master.pointsFront||[]); pts.forEach(p=>drawPoint(ctx,p,'#ffd23f'));}
function drawPoint(ctx,p,color){const c=$('overlay');const sx=c.width/640,sy=c.height/640;ctx.strokeStyle=color;ctx.lineWidth=4;if(p.type==='rect'){ctx.strokeRect(p.x*sx,p.y*sy,p.w*sx,p.h*sy);ctx.fillStyle=color;ctx.font='22px system-ui';ctx.fillText(p.name||'P',p.x*sx+4,p.y*sy+24)}else if(p.lines){ctx.beginPath();p.lines.forEach(s=>{ctx.moveTo(s[0][0]*sx,s[0][1]*sy);ctx.lineTo(s[1][0]*sx,s[1][1]*sy)});ctx.stroke();}}
function estimateTracking(){ // PoC: frame edge amount + center guide. This is only capture trigger, not pass/fail.
 const v=$('cam'),w=$('work'),ctx=w.getContext('2d'); if(v.readyState<2)return 0;ctx.drawImage(v,0,0,w.width,w.height); const img=ctx.getImageData(0,0,w.width,w.height).data;let sum=0;for(let i=0;i<img.length;i+=16){const b=(img[i]+img[i+1]+img[i+2])/3;sum+=b>35&&b<230?1:0;}return Math.min(.99,sum/(img.length/16)*2.8)}
function runInspection(){const results=[];const pts=phase==='top'?(master.pointsTop||[]):(master.pointsFront||[]); pts.forEach(p=>{const rate=scorePoint(p);results.push({p,rate,ok:rate>.45});});showResults(results); const allOk=results.every(r=>r.ok); if(allOk){ if(phase==='top'&&master.useSideCheck){setTimeout(()=>{phase='front';overlayImg=frontImg||topImg;captured=false;okFrames=0;$('phase').textContent='FRONT';loop()},800);} else showFinal(true);} else showFinal(false);}
function scorePoint(p){ // Edge-shape-ish comparison PoC: compares edge density/contrast in target ROI. Not final algorithm.
 const v=$('cam'),w=$('work'),ctx=w.getContext('2d');ctx.drawImage(v,0,0,w.width,w.height); let r;if(p.type==='rect')r=p;else{const xs=[],ys=[];(p.lines||[]).forEach(s=>s.forEach(q=>{xs.push(q[0]);ys.push(q[1])})); if(!xs.length)return 0; r={x:Math.min(...xs),y:Math.min(...ys),w:Math.max(...xs)-Math.min(...xs),h:Math.max(...ys)-Math.min(...ys)}} const x=Math.max(0,Math.floor(r.x/640*w.width)),y=Math.max(0,Math.floor(r.y/640*w.height)),ww=Math.max(8,Math.floor(r.w/640*w.width)),hh=Math.max(8,Math.floor(r.h/640*w.height)); const data=ctx.getImageData(x,y,Math.min(ww,w.width-x),Math.min(hh,w.height-y));return edgeDensity(data)}
function edgeDensity(img){const d=img.data,w=img.width,h=img.height;let edges=0,total=0;for(let y=1;y<h-1;y+=2){for(let x=1;x<w-1;x+=2){const i=(y*w+x)*4;const gx=(d[i+4]-d[i-4])+(d[i+w*4+4]-d[i+w*4-4]);const gy=(d[i+w*4]-d[i-w*4])+(d[i+w*4+4]-d[i-w*4+4]);const g=Math.abs(gx)+Math.abs(gy); if(g>80)edges++; total++;}}return Math.min(.99,edges/(total||1)*5)}
function showResults(results){const box=$('pointBox');box.innerHTML=results.map(r=>`<div class="row"><span>${r.p.name||'P'}</span><b class="${r.ok?'ok':'ng'}">${Math.round(r.rate*100)}% ${r.ok?'OK':'NG'}</b></div>`).join('')||'<div class="row"><span>検査ポイントなし</span><b class="wait">--</b></div>';const ctx=$('overlay').getContext('2d');results.forEach(r=>drawPoint(ctx,r.p,r.ok?'#28e070':'#ff4d6d'))}
function showFinal(ok){const r=$('result');r.className=ok?'':'ng';r.textContent=ok?'OK':'NG';r.style.display='flex';}
</script></body></html>

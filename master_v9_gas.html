<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ぴろえんす Master v9 GAS</title><style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--txt:#eef6ff;--muted:#9fb4d9;--cyan:#35dcff;--green:#35f078;--red:#ff4b5f;--yellow:#ffd84d}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#071225,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}header{padding:12px 16px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{font-size:19px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}main{display:grid;grid-template-columns:330px 1fr;gap:12px;padding:12px;max-width:1500px;margin:auto}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 12px 30px #0005}label{display:block;font-size:12px;color:#c8d8fa;margin:10px 0 5px}input,select{width:100%;padding:8px;border-radius:10px;border:1px solid #31517e;background:#071226;color:var(--txt)}button{width:100%;border:0;border-radius:11px;padding:11px 12px;margin-top:9px;background:linear-gradient(90deg,#2aa7ff,#39e0ff);font-weight:800;color:#001225;cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.danger{background:#62283a;color:white}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#020711;border:1px solid #27436f;border-radius:12px;padding:9px}.box h3{font-size:13px;margin:0 0 6px}.box canvas{width:100%;height:auto;background:#111;border-radius:8px;display:block}.big{grid-column:1/-1}.status{font-size:12px;color:#c6d8ff;white-space:pre-line;line-height:1.45;margin-top:10px}.roiList{margin-top:10px;border-top:1px solid #2a416b;padding-top:8px;max-height:220px;overflow:auto}.roiItem{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #20375f;padding:6px 0;font-size:12px}.decision{font-size:76px;font-weight:1000;text-align:center;border-radius:16px;padding:18px 12px;margin-bottom:10px;letter-spacing:.10em;line-height:1}.decision::before{content:"総合判定";display:block;font-size:14px;letter-spacing:.12em;margin-bottom:8px;color:#c8d8fa}.decision.wait{background:#26395f;color:#dce8ff;border:2px solid #405b8d}.decision.ok{background:#0f3d25;color:#35f078;border:3px solid #35f078}.decision.ng{background:#451520;color:#ff4b5f;border:3px solid #ff4b5f}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}.metric{background:#071226;border:1px solid #29436d;border-radius:10px;padding:9px;text-align:center}.metric b{display:block;font-size:22px}.metric small{color:#aabde0}.on{outline:2px solid var(--yellow);background:#ffd84d!important;color:#111!important}@media(max-width:900px){main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.decision{font-size:52px}}
</style></head>
<body>
<header><h1>ぴろえんす Master v9 / 検査ポイント登録</h1><div class="sub">Windows用。Ctrl+ホイールズーム、ホイールドラッグ/右ドラッグパン対応。画像と検査ポイントをGoogleスプレッドシートへ保存します。</div></header>
<main>
<section class="card">
<label>GAS URL</label><input id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
<button class="secondary" onclick="saveGasUrl();log('GAS URL保存')">GAS URL保存</button>
<label>品番</label><input id="partNo" placeholder="例：BREY001">
<label>メモ</label><input id="memo" placeholder="例：カッター刃先検査">
<label>マスター画像</label><input id="masterFile" type="file" accept="image/*">
<div class="row"><button id="fitBtn" class="secondary" type="button">全体表示</button><button id="actualBtn" class="secondary" type="button">100%</button></div>
<div class="status" id="zoomStatus">倍率: --</div>
<button id="pointBtn" class="secondary">検査ポイント登録</button>
<label>検査ポイント名</label><input id="pointName" placeholder="例：刃先 / 刻印 / 穴A">
<label>検査内容</label><select id="pointType"><option value="present">あることを確認</option><option value="absent">ないことを確認</option></select>
<label>差異NGしきい値%</label><input id="pointThr" type="range" min="1" max="60" value="12"><span id="pointThrVal">12</span>%
<button id="saveBtn">スプレッドシートへ保存</button>
<div id="status" class="status">未読込</div>
<div id="pointList" class="roiList"></div>
</section>
<section class="card">
<div class="grid">
<div class="box big"><h3>マスター画像（ドラッグで検査ポイント登録）</h3><canvas id="masterCanvas" width="1000" height="650"></canvas></div>
</div>
</section>
</main>
<script>

const $=id=>document.getElementById(id);
function log(s){$('status').textContent=s}
function getGasUrl(){return ($('gasUrl')?.value || localStorage.getItem('PIROENS_GAS_URL') || '').trim()}
function saveGasUrl(){const u=getGasUrl(); if(u) localStorage.setItem('PIROENS_GAS_URL',u);}
function loadImage(file){return new Promise((res,rej)=>{const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=URL.createObjectURL(file);})}
function dataUrlToImage(dataUrl){return new Promise((res,rej)=>{const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=dataUrl;})}
function compressImage(img,maxW=700,quality=0.55){const scale=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);const x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',quality)}
function baseFit(canvas,img){const r=Math.min(canvas.width/img.width,canvas.height/img.height),w=img.width*r,h=img.height*r,ox=(canvas.width-w)/2,oy=(canvas.height-h)/2;return{r,w,h,ox,oy}}
let view={zoom:1,panX:0,panY:0};
function totalScale(canvas,img){const f=baseFit(canvas,img);return f.r*view.zoom}
function updateZoomStatus(){const z=$('zoomStatus'); if(!z||!masterImg)return; const pct=Math.round(totalScale(mc,masterImg)*100); z.textContent='倍率: '+pct+'%　Ctrl+ホイール=拡大縮小 / ホイール押し込み・右ドラッグ=パン';}
function drawImageFit(canvas,img,drawFn){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);if(!img)return;const f=baseFit(canvas,img);ctx.drawImage(img,f.ox+view.panX,f.oy+view.panY,f.w*view.zoom,f.h*view.zoom);if(drawFn)drawFn(ctx,canvas,img);updateZoomStatus();}
function fitParams(canvas,img){const f=baseFit(canvas,img);return{r:f.r*view.zoom,ox:f.ox+view.panX,oy:f.oy+view.panY,w:f.w*view.zoom,h:f.h*view.zoom}}
function eventToImg(canvas,e,img){const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left)*canvas.width/rect.width,y=(e.clientY-rect.top)*canvas.height/rect.height;const f=fitParams(canvas,img);return{x:(x-f.ox)/f.r,y:(y-f.oy)/f.r}}
function zoomAt(canvas,img,clientX,clientY,factor){if(!img)return;const rect=canvas.getBoundingClientRect();const cx=(clientX-rect.left)*canvas.width/rect.width,cy=(clientY-rect.top)*canvas.height/rect.height;const before=eventToImg(canvas,{clientX,clientY},img);view.zoom=Math.max(0.1,Math.min(20,view.zoom*factor));const f=fitParams(canvas,img);view.panX += cx - (f.ox + before.x*f.r);view.panY += cy - (f.oy + before.y*f.r);redrawMaster();}
function fitView(){view.zoom=1;view.panX=0;view.panY=0;redrawMaster();}
function actualView(){if(!masterImg)return;const f=baseFit(mc,masterImg);view.zoom=1/f.r;view.panX=0;view.panY=0;redrawMaster();}
function setDecision(t,cls){const d=$('decision');if(!d)return;d.className='decision '+cls;d.textContent=t}
function renderPointList(points, listId='pointList'){const el=$(listId); if(!el)return; el.innerHTML='<b>検査ポイント: '+points.length+'件</b>'+points.map((r,i)=>`<div class="roiItem"><span>${i+1}. ${r.name}<br><small>${r.type==='absent'?'ないこと確認':'あること確認'} / 差異NG ${r.threshold ?? 12}%</small></span><button class="danger" data-del="${i}">削除</button></div>`).join(''); el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{points.splice(+b.dataset.del,1); if(selectedIndex===+b.dataset.del)selectedIndex=-1; renderPointList(points); if(typeof redrawMaster==='function')redrawMaster();});}
let masterImg=null, points=[], pointMode=false, dragStart=null, dragCurrent=null;
let selectedIndex=-1, panning=false, panStart=null;
$('gasUrl').value=localStorage.getItem('PIROENS_GAS_URL')||'';
$('pointThr').oninput=()=>$('pointThrVal').textContent=$('pointThr').value;
$('masterFile').onchange=async e=>{masterImg=await loadImage(e.target.files[0]);fitView(); log('マスター画像読込OK');};
$('fitBtn').onclick=fitView;
$('actualBtn').onclick=actualView;
$('pointBtn').onclick=()=>{pointMode=!pointMode;$('pointBtn').classList.toggle('on',pointMode);$('pointBtn').textContent=pointMode?'登録中（ドラッグ）':'検査ポイント登録';};
const mc=$('masterCanvas');
function redrawMaster(){drawImageFit(mc,masterImg,drawPoints)}
function drawPoints(ctx,canvas,img){if(!img)return;const f=fitParams(canvas,img);ctx.save();ctx.translate(f.ox,f.oy);ctx.scale(f.r,f.r);ctx.font=`${16/f.r}px sans-serif`;points.forEach((p,i)=>{const sel=i===selectedIndex;ctx.strokeStyle=sel?'#35dcff':'#ffd84d';ctx.lineWidth=(sel?6:4)/f.r;if(sel){ctx.setLineDash([12/f.r,8/f.r]);ctx.lineDashOffset=-(Date.now()/60)%(20/f.r);}else{ctx.setLineDash([]);}ctx.strokeRect(p.x,p.y,p.w,p.h);ctx.setLineDash([]);ctx.fillStyle=sel?'#35dcff':'#ffd84d';ctx.fillText(p.name,p.x,p.y-6)});if(dragStart&&dragCurrent){const x=Math.min(dragStart.x,dragCurrent.x),y=Math.min(dragStart.y,dragCurrent.y),w=Math.abs(dragCurrent.x-dragStart.x),h=Math.abs(dragCurrent.y-dragStart.y);ctx.setLineDash([10/f.r,6/f.r]);ctx.lineDashOffset=-(Date.now()/45)%(16/f.r);ctx.strokeStyle='#35dcff';ctx.fillStyle='rgba(53,220,255,.16)';ctx.lineWidth=5/f.r;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);ctx.fillStyle='#35dcff';ctx.fillText('選択中',x,y-8);requestAnimationFrame(()=>{if(dragStart)redrawMaster();});}ctx.restore();}
function hitPoint(p){for(let i=points.length-1;i>=0;i--){const r=points[i];if(p.x>=r.x&&p.y>=r.y&&p.x<=r.x+r.w&&p.y<=r.y+r.h)return i;}return -1;}
mc.addEventListener('contextmenu',e=>e.preventDefault());
mc.addEventListener('wheel',e=>{if(!masterImg)return;if(e.ctrlKey){e.preventDefault();zoomAt(mc,masterImg,e.clientX,e.clientY,e.deltaY<0?1.12:1/1.12)}},{passive:false});
mc.addEventListener('mousedown',e=>{if(!masterImg)return;if(e.button===1||e.button===2){panning=true;panStart={x:e.clientX,y:e.clientY,px:view.panX,py:view.panY};e.preventDefault();return;}if(e.button!==0)return;const p=eventToImg(mc,e,masterImg);if(pointMode){dragStart=p;dragCurrent=p;redrawMaster();}else{selectedIndex=hitPoint(p);redrawMaster();}});
window.addEventListener('mousemove',e=>{if(!masterImg)return;if(panning&&panStart){view.panX=panStart.px+(e.clientX-panStart.x)*mc.width/mc.getBoundingClientRect().width;view.panY=panStart.py+(e.clientY-panStart.y)*mc.height/mc.getBoundingClientRect().height;redrawMaster();return;}if(pointMode&&dragStart){dragCurrent=eventToImg(mc,e,masterImg);redrawMaster();}});
window.addEventListener('mouseup',e=>{if(panning){panning=false;panStart=null;return;}if(!pointMode||!masterImg||!dragStart)return;const p=eventToImg(mc,e,masterImg);const x=Math.min(dragStart.x,p.x),y=Math.min(dragStart.y,p.y),w=Math.abs(p.x-dragStart.x),h=Math.abs(p.y-dragStart.y);dragStart=null;dragCurrent=null;if(w<8||h<8){redrawMaster();return}points.push({name:$('pointName').value.trim()||'検査ポイント'+(points.length+1),type:$('pointType').value,threshold:+$('pointThr').value,x,y,w,h});selectedIndex=points.length-1;renderPointList(points);redrawMaster();});
window.addEventListener('keydown',e=>{const tag=(document.activeElement&&document.activeElement.tagName)||'';if(tag==='INPUT'||tag==='TEXTAREA')return;if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();points.pop();selectedIndex=-1;renderPointList(points);redrawMaster();log('直前の検査ポイントを取り消しました');}if(e.key==='Delete'||e.key==='Backspace'){if(selectedIndex>=0){e.preventDefault();points.splice(selectedIndex,1);selectedIndex=-1;renderPointList(points);redrawMaster();log('選択中の検査ポイントを削除しました');}}if(e.key==='Home'){e.preventDefault();fitView();}});
mc.addEventListener('dblclick',e=>{if(!masterImg)return;const p=eventToImg(mc,e,masterImg);const idx=hitPoint(p);if(idx<0)return;selectedIndex=idx;const r=points[idx];const name=prompt('検査ポイント名',r.name);if(name!==null)r.name=name.trim()||r.name;const th=prompt('差異NGしきい値%',String(r.threshold??12));if(th!==null&&!isNaN(+th))r.threshold=+th;renderPointList(points);redrawMaster();});
$('saveBtn').onclick=async()=>{
  const gas=getGasUrl(); if(!gas){alert('GAS URLを入れて');return}
  const partNo=$('partNo').value.trim(); if(!partNo){alert('品番を入れて');return}
  if(!masterImg){alert('マスター画像を選んで');return}
  const topData=compressImage(masterImg,700,0.55);
  const saveScale = Math.min(1, 700 / masterImg.width);

const pointsForSave = points.map(p => ({
  ...p,
  x: p.x * saveScale,
  y: p.y * saveScale,
  w: p.w * saveScale,
  h: p.h * saveScale
}));
  const payload={partNo,memo:$('memo').value.trim(),topData,frontData:'',points: pointsForSave,,useFront:false};
  log('保存中...');
  const res=await fetch(gas,{method:'POST',body:JSON.stringify(payload)});
  const js=await res.json();
  if(!js.ok) throw new Error(js.error||'保存失敗');
  log('保存OK: '+partNo+'\n画像サイズ: '+Math.round(topData.length/1024)+'KB');
};
renderPointList(points);
</script></body></html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vision PoC Master v9</title>
<style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--cyan:#31d7ff;--txt:#eef6ff;--muted:#9fb4d9;--red:#ff4268;--green:#3dff9b}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#071225,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}header{padding:18px 24px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{margin:0;font-size:22px}.sub{color:var(--muted);font-size:13px;margin-top:4px}main{display:grid;grid-template-columns:420px 1fr;gap:20px;padding:20px;max-width:1600px;margin:auto}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}label{display:block;color:#bcd0f7;font-size:13px;margin:12px 0 6px}input,select{width:100%;padding:12px 14px;border-radius:13px;border:1px solid #31517e;background:#071226;color:var(--txt);font-size:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.drop{border:2px dashed #6d8dd0;border-radius:18px;height:150px;display:flex;align-items:center;justify-content:center;text-align:center;color:#cfe0ff;margin-top:14px;background:#17223c}.drop.drag{background:#22365f;border-color:var(--cyan)}button{width:100%;border:0;border-radius:14px;padding:13px 14px;margin-top:12px;font-weight:800;font-size:16px;color:#001225;background:linear-gradient(90deg,#2aa7ff,#39e0ff);cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.danger{background:#55273a;color:#fff}button.good{background:linear-gradient(90deg,#30ff91,#75ffd4)}button.active{background:linear-gradient(90deg,#ffbd3c,#ffeb72);color:#201000;box-shadow:0 0 20px rgba(255,190,60,.35)}.status{margin-top:12px;color:#bcd0f7;font-size:13px;white-space:pre-line}.previewGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.canvasWrap{position:relative;background:#030812;border:1px solid #27436f;border-radius:16px;padding:10px;overflow:hidden}.canvasWrap:hover{border-color:#4edfff}.zoomLayer{position:relative;transform-origin:center center}.canvasWrap canvas.base{width:100%;height:auto;background:#020711;border-radius:12px;display:block}.canvasWrap canvas.hover{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;border-radius:12px}.cap{text-align:center;color:#bcd0f7;margin-top:8px}.badge{position:absolute;left:18px;top:18px;background:#071226dd;border:1px solid #31517e;border-radius:999px;padding:7px 11px;font-size:12px;z-index:3}.zoomBadge{position:absolute;right:18px;top:18px;background:#071226dd;border:1px solid #31517e;border-radius:999px;padding:7px 11px;font-size:12px;z-index:3}.point{position:absolute;width:24px;height:24px;border:3px solid var(--red);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(255,75,110,.8);pointer-events:none;z-index:4}.cursorMsg{font-size:12px;color:#ffd98e;margin-top:8px}.list{margin-top:16px;border-top:1px solid #2a416b;padding-top:10px}.item{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #22365f;color:#d7e6ff}.smallbtn{width:auto;padding:8px 12px;font-size:13px;margin:0;border-radius:10px}.hint{font-size:12px;color:#9fb4d9;margin-top:6px}.pointsBox{max-height:210px;overflow:auto;border:1px solid #29436d;border-radius:12px;padding:8px;margin-top:8px}.pill{display:block;border:1px solid #31517e;border-radius:12px;padding:7px 9px;margin:4px 0;color:#dff8ff;background:#071226}.pill b{color:#fff}.hidden{display:none!important}@media(max-width:1100px){main{grid-template-columns:1fr;padding:12px}.previewGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Vision PoC Master v9 / 投影線画＋検査ポイント登録</h1><div class="sub">v7の投影線画ロジックに戻し、正面/側面表記、検査ポイント登録、Ctrl+ホイール拡大、エッジホバー強調を追加。</div></header>
<main>
<section class="card">
<label>品番</label><input id="partNo" placeholder="例：BRKT-001-LH" />
<label>品名・メモ</label><input id="memo" placeholder="例：ブラケットLH 上面＋正面検査" />
<div class="row"><div><label>検査に使う側面</label><select id="sideChoice"><option value="front">正面</option><option value="side">側面</option></select></div><div><label>線画</label><select id="mode"><option value="edges">外形/折れ線エッジ</option><option value="wire">全メッシュ線</option></select></div></div>
<label>線の太さ</label><select id="lineWidth"><option value="2">細い</option><option value="3" selected>標準</option><option value="5">太い</option></select>
<div id="drop" class="drop">STLをここにドラッグ＆ドロップ<br>または下から選択</div>
<input id="fileInput" type="file" accept=".stl,model/stl" />
<button id="pointModeBtn" class="secondary">検査ポイント追加モード：OFF</button>
<div id="pointHelp" class="hint">OFF中。ONにすると画像クリックでポイント追加。Ctrl＋ホイールで各画像を拡大縮小できます。</div>
<div id="points" class="pointsBox">検査ポイントなし</div>
<button id="saveBtn" class="good">この品番で登録</button>
<button id="exportBtn" class="secondary">マスターJSONを書き出し</button>
<label>マスターJSON読込</label><input id="importInput" type="file" accept=".json,application/json" />
<button id="clearBtn" class="danger">全マスター削除</button>
<div id="status" class="status">未読込</div>
<div id="list" class="list"></div>
</section>
<section class="card">
<div class="previewGrid">
<div class="canvasWrap" data-view="top"><span class="badge">上面</span><span class="zoomBadge" id="topZoom">100%</span><div class="zoomLayer" id="topLayer"><canvas class="base" id="topCanvas" width="760" height="760"></canvas><canvas class="hover" id="topHover" width="760" height="760"></canvas><div id="topPts"></div></div><div class="cap">上面</div><div class="cursorMsg" id="topHint">-</div></div>
<div class="canvasWrap" data-view="front"><span class="badge">正面</span><span class="zoomBadge" id="frontZoom">100%</span><div class="zoomLayer" id="frontLayer"><canvas class="base" id="frontCanvas" width="760" height="760"></canvas><canvas class="hover" id="frontHover" width="760" height="760"></canvas><div id="frontPts"></div></div><div class="cap">正面</div><div class="cursorMsg" id="frontHint">-</div></div>
<div class="canvasWrap" data-view="side"><span class="badge">側面</span><span class="zoomBadge" id="sideZoom">100%</span><div class="zoomLayer" id="sideLayer"><canvas class="base" id="sideCanvas" width="760" height="760"></canvas><canvas class="hover" id="sideHover" width="760" height="760"></canvas><div id="sidePts"></div></div><div class="cap">側面</div><div class="cursorMsg" id="sideHint">-</div></div>
</div>
</section>
</main>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { STLLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js';
const DB_KEY='visionPocMasters.v9';
const $=id=>document.getElementById(id); const status=$('status'), drop=$('drop'), fileInput=$('fileInput');
const canvases={top:$('topCanvas'),front:$('frontCanvas'),side:$('sideCanvas')};
const hoverCanvases={top:$('topHover'),front:$('frontHover'),side:$('sideHover')};
const planes={top:'xy',front:'xz',side:'yz'};
let current=null, pointMode=false, points=[], segments={top:[],front:[],side:[]}, zoom={top:1,front:1,side:1};
function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return {}}}
function setDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
function log(s){status.textContent=s}
function prevent(e){e.preventDefault();e.stopPropagation()}
['dragenter','dragover','dragleave','drop'].forEach(ev=>window.addEventListener(ev,prevent,false));
drop.addEventListener('dragover',e=>{prevent(e);drop.classList.add('drag')}); drop.addEventListener('dragleave',e=>{prevent(e);drop.classList.remove('drag')});
drop.addEventListener('drop',e=>{prevent(e);drop.classList.remove('drag');const f=e.dataTransfer.files?.[0];if(f)loadFile(f)}); fileInput.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)loadFile(f)});
async function loadFile(file){log('STL読込中: '+file.name);try{const buf=await file.arrayBuffer();const geom=new STLLoader().parse(buf);geom.computeVertexNormals();geom.computeBoundingBox();current={fileName:file.name,geometry:geom};points=[];renderAll();renderPoints();log('STL読込OK: '+file.name+'\n上面・正面・側面を生成しました。')}catch(err){console.error(err);log('STL読込エラー: '+err.message)}}
function makeLineGeometry(g){ if($('mode').value==='wire') return new THREE.WireframeGeometry(g); let e=new THREE.EdgesGeometry(g,8); const count=e.getAttribute('position')?.count||0; if(count<2) e=new THREE.WireframeGeometry(g); return e; }
function axisPair(plane){ if(plane==='xz') return ['x','z']; if(plane==='yz') return ['y','z']; return ['x','y']; }
function projectPoint(x,y,z,plane){ if(plane==='xz') return [x,z]; if(plane==='yz') return [y,z]; return [x,y]; }
function drawProjection(view){
  const canvas=canvases[view], geometry=current.geometry, plane=planes[view], hint=$(view+'Hint'); const w=canvas.width,h=canvas.height,pad=56; const ctx=canvas.getContext('2d'); ctx.fillStyle='#020711'; ctx.fillRect(0,0,w,h); segments[view]=[];
  const eg=makeLineGeometry(geometry); const pos=eg.getAttribute('position'); if(!pos||pos.count<2){hint.textContent='線データなし';return}
  let pts=[]; for(let i=0;i<pos.count;i++) pts.push(projectPoint(pos.getX(i),pos.getY(i),pos.getZ(i),plane));
  let minU=Infinity,maxU=-Infinity,minV=Infinity,maxV=-Infinity; for(const [u,v] of pts){if(u<minU)minU=u;if(u>maxU)maxU=u;if(v<minV)minV=v;if(v>maxV)maxV=v}
  let spanU=maxU-minU, spanV=maxV-minV; const rawU=spanU, rawV=spanV; const tiny=1e-6; if(spanU<tiny) spanU=1; if(spanV<tiny) spanV=1; const scale=Math.min((w-pad*2)/spanU,(h-pad*2)/spanV); const cx=(minU+maxU)/2, cy=(minV+maxV)/2; const map=([u,v])=>[w/2+(u-cx)*scale,h/2-(v-cy)*scale];
  ctx.strokeStyle='#31dcff'; ctx.lineWidth=Number($('lineWidth').value||3); ctx.lineCap='round'; ctx.lineJoin='round';
  for(let i=0;i<pts.length;i+=2){const a=map(pts[i]), b=map(pts[i+1]); segments[view].push([a[0],a[1],b[0],b[1]]); ctx.beginPath(); ctx.moveTo(a[0],a[1]); ctx.lineTo(b[0],b[1]); ctx.stroke();}
  const [a1,a2]=axisPair(plane); hint.textContent=`${view==='top'?'上面':view==='front'?'正面':'側面'}：${a1.toUpperCase()}幅 ${rawU.toFixed(2)} / ${a2.toUpperCase()}幅 ${rawV.toFixed(2)}　※Ctrl＋ホイールで拡大`;
}
function renderAll(){if(!current)return; ['top','front','side'].forEach(drawProjection); clearHover(); renderPoints();}
['mode','lineWidth'].forEach(id=>$(id).addEventListener('change',renderAll));
function clearHover(view){const keys=view?[view]:['top','front','side']; keys.forEach(v=>hoverCanvases[v].getContext('2d').clearRect(0,0,hoverCanvases[v].width,hoverCanvases[v].height));}
function distToSeg(px,py,s){const [x1,y1,x2,y2]=s; const dx=x2-x1,dy=y2-y1; const len2=dx*dx+dy*dy||1; let t=((px-x1)*dx+(py-y1)*dy)/len2; t=Math.max(0,Math.min(1,t)); const x=x1+t*dx,y=y1+t*dy; const dd=(px-x)**2+(py-y)**2; return {d:Math.sqrt(dd),x,y,t};}
function findNearest(view,x,y){let best=null,bd=Infinity; for(const s of segments[view]){const r=distToSeg(x,y,s); if(r.d<bd){bd=r.d;best={s,r}}} return bd<18?best:null;}
function drawHover(view,best){clearHover(view); if(!best)return; const c=hoverCanvases[view],ctx=c.getContext('2d'),s=best.s; ctx.strokeStyle='#ff315c'; ctx.lineWidth=8; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(s[0],s[1]); ctx.lineTo(s[2],s[3]); ctx.stroke(); ctx.beginPath(); ctx.arc(best.r.x,best.r.y,13,0,Math.PI*2); ctx.strokeStyle='#ffeb3c'; ctx.lineWidth=4; ctx.stroke();}
document.querySelectorAll('.canvasWrap').forEach(w=>{
  const view=w.dataset.view;
  w.addEventListener('wheel',e=>{ if(!e.ctrlKey)return; prevent(e); const dir=e.deltaY<0?1.12:1/1.12; zoom[view]=Math.max(0.5,Math.min(8,zoom[view]*dir)); $(view+'Layer').style.transform=`scale(${zoom[view]})`; $(view+'Zoom').textContent=Math.round(zoom[view]*100)+'%'; });
  w.addEventListener('mousemove',e=>{ const canvas=canvases[view]; const r=canvas.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width*canvas.width; const y=(e.clientY-r.top)/r.height*canvas.height; drawHover(view,findNearest(view,x,y)); });
  w.addEventListener('mouseleave',()=>clearHover(view));
  w.addEventListener('click',e=>{ if(!pointMode)return; const canvas=canvases[view]; const r=canvas.getBoundingClientRect(); let x=(e.clientX-r.left)/r.width; let y=(e.clientY-r.top)/r.height; x=Math.max(0,Math.min(1,x)); y=Math.max(0,Math.min(1,y)); const name=prompt('検査ポイント名', view==='top'?'穴A':'重要部位'); if(!name)return; const type=prompt('種別（穴/ナット/切欠き/自由）','穴')||'自由'; points.push({view,x,y,name,type,tol:0.055}); renderPoints(); });
});
$('pointModeBtn').onclick=()=>{pointMode=!pointMode;$('pointModeBtn').textContent='検査ポイント追加モード：'+(pointMode?'ON':'OFF');$('pointModeBtn').classList.toggle('active',pointMode);$('pointHelp').textContent=pointMode?'ON中：画像上でポイントを置きたい場所をクリック。マウスオーバーすると近いエッジが赤く光ります。':'OFF中。ONにすると画像クリックでポイント追加。Ctrl＋ホイールで各画像を拡大縮小できます。'};
function renderPoints(){['top','front','side'].forEach(v=>{$(v+'Pts').innerHTML=''});points.forEach((p,i)=>{const el=document.createElement('div');el.className='point';el.title=p.name;el.style.left=(p.x*100)+'%';el.style.top=(p.y*100)+'%';$(p.view+'Pts').appendChild(el)});$('points').innerHTML=points.length?points.map((p,i)=>`<span class="pill"><b>${i+1}. ${p.view==='top'?'上面':p.view==='front'?'正面':'側面'}</b> / ${p.type} / ${p.name} <button class="smallbtn danger" data-i="${i}">削除</button></span>`).join(''):'検査ポイントなし';document.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>{points.splice(Number(b.dataset.i),1);renderPoints()})}
$('saveBtn').onclick=()=>{const partNo=$('partNo').value.trim();if(!partNo){alert('品番を入れて');return}if(!current){alert('STLを読み込んで');return}const db=getDB();db[partNo]={partNo,memo:$('memo').value.trim(),fileName:current.fileName,top:canvases.top.toDataURL('image/png'),front:canvases.front.toDataURL('image/png'),side:canvases.side.toDataURL('image/png'),sideChoice:$('sideChoice').value,points,createdAt:new Date().toISOString(),mode:$('mode').value};try{setDB(db);log('登録OK: '+partNo+'\ninspect_render_v9.htmlでJSON読込して使えます。');renderList()}catch(e){console.error(e);alert('保存容量エラー。JSON書き出し運用にしてください。')}};
$('exportBtn').onclick=()=>{const db=getDB();const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vision-master-v9.json';a.click();URL.revokeObjectURL(a.href)};
$('importInput').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;const db=JSON.parse(await f.text());setDB(db);renderList();log('JSON読込OK')});
$('clearBtn').onclick=()=>{if(confirm('全マスター削除？')){localStorage.removeItem(DB_KEY);renderList();log('全削除しました')}};
function renderList(){const db=getDB();const keys=Object.keys(db);$('list').innerHTML='<b>登録済み: '+keys.length+'件</b>'+keys.map(k=>`<div class="item"><span>${k}<br><small>${db[k].memo||''}</small></span><button class="smallbtn danger" data-k="${k}">削除</button></div>`).join('');document.querySelectorAll('button[data-k]').forEach(b=>b.onclick=()=>{const db=getDB();delete db[b.dataset.k];setDB(db);renderList()})}renderList();
</script>
</body></html>

<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vision PoC Master v4</title>
<style>
  :root{--bg:#071022;--card:#111b33;--line:#23365e;--txt:#eaf2ff;--mut:#9fb4dc;--acc:#35d8ff;--ok:#1ee87f;--bad:#ff4d66}
  *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#050914,#111a33);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
  header{padding:18px 24px;border-bottom:1px solid var(--line);font-weight:800;font-size:22px}
  main{display:grid;grid-template-columns:420px 1fr;gap:22px;padding:22px;min-height:calc(100vh - 65px)}
  .card{background:rgba(17,27,51,.9);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  label{display:block;color:#bcd0ff;font-size:13px;margin:12px 0 6px} input,button{font:inherit}
  input[type=text]{width:100%;padding:14px 16px;border-radius:14px;border:1px solid #34507f;background:#061022;color:#fff;font-size:18px}
  .drop{height:190px;border:2px dashed #6f8ccd;border-radius:18px;display:flex;align-items:center;justify-content:center;text-align:center;color:#c7d7ff;margin-top:18px;background:rgba(255,255,255,.03)}
  .drop.drag{border-color:var(--acc);background:rgba(53,216,255,.12)}
  .fileRow{display:flex;gap:10px;align-items:center;margin:10px 0 16px}.fileRow input{flex:1;color:#fff}
  button{width:100%;padding:15px 16px;border:0;border-radius:14px;background:linear-gradient(90deg,#2396ff,#35d8ff);font-weight:900;color:#001123;cursor:pointer;margin:8px 0;font-size:18px}
  button.secondary{background:#25365f;color:#eaf2ff}.status{padding:12px;border-radius:12px;background:#071022;color:#c7d7ff;margin-top:12px;white-space:pre-wrap}
  .previewTitle{display:inline-block;background:#071022;border-radius:18px;padding:10px 16px;margin-bottom:18px}.canvases{display:flex;gap:16px;flex-wrap:wrap}.box{flex:1;min-width:300px}.canvasBox{height:360px;background:#020712;border:1px solid #28406f;border-radius:16px;display:flex;align-items:center;justify-content:center}canvas{max-width:100%;max-height:100%}.cap{text-align:center;color:#bcd0ff;margin-top:10px}.list{font-size:14px;color:#c7d7ff;line-height:1.8}.warn{color:#ffd36b}
</style>
</head>
<body>
<header>Vision PoC Master v4｜STL→外形シルエット登録</header>
<main>
<section class="card">
  <label>品番</label><input id="partNo" type="text" placeholder="例：BRKT ASSY LH">
  <label>品名・メモ</label><input id="memo" type="text" placeholder="例：上面＋側面検査">
  <div id="drop" class="drop">STLをここにドラッグ＆ドロップ<br>または下のボタンで選択</div>
  <div class="fileRow"><input id="fileInput" type="file" accept=".stl,model/stl"></div>
  <button id="saveBtn">この品番で登録</button>
  <button id="exportBtn" class="secondary">マスターJSONを書き出し</button>
  <label>マスターJSON読込</label><input id="importInput" type="file" accept=".json,application/json">
  <button id="clearBtn" class="secondary">全マスター削除</button>
  <div id="status" class="status">未読込</div>
  <div class="list" id="list"></div>
</section>
<section class="card">
  <div class="previewTitle">STLから外形シルエット自動生成プレビュー</div>
  <div class="canvases">
    <div class="box"><div class="canvasBox"><canvas id="topCanvas" width="640" height="640"></canvas></div><div class="cap">上面シルエット</div></div>
    <div class="box"><div class="canvasBox"><canvas id="sideCanvas" width="640" height="640"></canvas></div><div class="cap">側面シルエット</div></div>
  </div>
  <p class="warn">※v4はSTLの全メッシュ線ではなく、投影後の外形シルエット画像だけを保存します。localStorage容量超過対策済み。</p>
</section>
</main>
<script type="module">
import { STLLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js';

const DB_KEY='visionPocMasters.v4';
const loader=new STLLoader();
const el=id=>document.getElementById(id);
const drop=el('drop'), fileInput=el('fileInput'), status=el('status');
const topCanvas=el('topCanvas'), sideCanvas=el('sideCanvas');
let current=null;

window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>e.preventDefault());

drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drag')});
drop.addEventListener('dragleave',()=>drop.classList.remove('drag'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('drag');const f=e.dataTransfer.files?.[0]; if(f) loadFile(f);});
fileInput.addEventListener('change',e=>{const f=e.target.files?.[0]; if(f) loadFile(f);});
el('saveBtn').onclick=saveCurrent;
el('exportBtn').onclick=exportDB;
el('importInput').addEventListener('change',importDB);
el('clearBtn').onclick=()=>{ if(confirm('全マスターを削除しますか？')){localStorage.removeItem(DB_KEY); renderList(); status.textContent='全削除しました';}};

function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch{return {}}}
function setDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function renderList(){const db=getDB(); const keys=Object.keys(db); el('list').innerHTML='<h3>登録済み</h3>'+ (keys.length?keys.map(k=>`・${k}：${db[k].memo||''}`).join('<br>'):'なし');}

async function loadFile(file){
  status.textContent='STL読込中：'+file.name;
  const buf=await file.arrayBuffer();
  const geom=loader.parse(buf);
  geom.computeBoundingBox();
  const top = makeSilhouette(geom,'top',topCanvas);
  const side = makeSilhouette(geom,'side',sideCanvas);
  current={fileName:file.name, top, side};
  status.textContent='STL読込OK：'+file.name+'\n外形シルエット生成OK';
}

function makeSilhouette(geometry,view,canvas){
  const pos=geometry.attributes.position.array;
  const pts=[];
  for(let i=0;i<pos.length;i+=3){
    const x=pos[i], y=pos[i+1], z=pos[i+2];
    pts.push(view==='top' ? [x,y] : [x,z]);
  }
  drawSilhouetteFromPoints(pts,canvas);
  return canvas.toDataURL('image/png',0.75);
}

function drawSilhouetteFromPoints(points,canvas){
  const w=canvas.width,h=canvas.height,ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h); ctx.fillStyle='#020712'; ctx.fillRect(0,0,w,h);
  if(points.length<3) return;
  const hull=convexHull(points);
  const xs=hull.map(p=>p[0]), ys=hull.map(p=>p[1]);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const sx=(w*0.78)/(maxX-minX||1), sy=(h*0.78)/(maxY-minY||1), s=Math.min(sx,sy);
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;
  ctx.strokeStyle='#35d8ff'; ctx.lineWidth=5; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath();
  hull.forEach((p,i)=>{const X=w/2+(p[0]-cx)*s; const Y=h/2-(p[1]-cy)*s; if(i===0)ctx.moveTo(X,Y); else ctx.lineTo(X,Y);});
  ctx.closePath(); ctx.stroke();
}

function convexHull(points){
  const pts=[...points].sort((a,b)=>a[0]===b[0]?a[1]-b[1]:a[0]-b[0]);
  const cross=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lower=[]; for(const p of pts){while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop(); lower.push(p)}
  const upper=[]; for(let i=pts.length-1;i>=0;i--){const p=pts[i]; while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop(); upper.push(p)}
  upper.pop(); lower.pop(); return lower.concat(upper);
}

function saveCurrent(){
  const partNo=el('partNo').value.trim(); if(!partNo){alert('品番を入力して');return} if(!current){alert('STLを読んでから登録して');return}
  const db=getDB();
  db[partNo]={partNo,memo:el('memo').value.trim(),top:current.top,side:current.side,fileName:current.fileName,createdAt:new Date().toISOString()};
  setDB(db); renderList(); status.textContent='登録OK：'+partNo+'\n保存内容：シルエット画像のみ（STL本体は保存しません）';
}
function exportDB(){
  const blob=new Blob([JSON.stringify(getDB(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vision-master.json'; a.click(); URL.revokeObjectURL(a.href);
}
async function importDB(e){const f=e.target.files?.[0]; if(!f)return; setDB(JSON.parse(await f.text())); renderList(); status.textContent='JSON読込OK：'+f.name;}
renderList();
</script>
</body>
</html>

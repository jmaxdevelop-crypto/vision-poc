<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vision PoC Master v12</title>
<style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--cyan:#31d7ff;--txt:#eef6ff;--muted:#9fb4d9;--red:#ff4268;--yellow:#ffe35b;--green:#3dff9b}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#071225,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}header{padding:16px 22px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{margin:0;font-size:22px}.sub{color:var(--muted);font-size:13px;margin-top:4px}main{display:grid;grid-template-columns:420px 1fr;gap:18px;padding:18px;max-width:1700px;margin:auto}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}label{display:block;color:#bcd0f7;font-size:13px;margin:12px 0 6px}input,select{width:100%;padding:12px 14px;border-radius:13px;border:1px solid #31517e;background:#071226;color:var(--txt);font-size:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.drop{border:2px dashed #6d8dd0;border-radius:18px;height:136px;display:flex;align-items:center;justify-content:center;text-align:center;color:#cfe0ff;margin-top:14px;background:#17223c}.drop.drag{background:#22365f;border-color:var(--cyan)}button{width:100%;border:0;border-radius:14px;padding:12px 14px;margin-top:10px;font-weight:800;font-size:15px;color:#001225;background:linear-gradient(90deg,#2aa7ff,#39e0ff);cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.danger{background:#55273a;color:#fff}button.good{background:linear-gradient(90deg,#30ff91,#75ffd4)}button.active{background:linear-gradient(90deg,#ffbd3c,#ffeb72);color:#201000;box-shadow:0 0 20px rgba(255,190,60,.35)}.status{margin-top:10px;color:#bcd0f7;font-size:13px;white-space:pre-line}.previewGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.canvasWrap{position:relative;background:#030812;border:1px solid #27436f;border-radius:16px;padding:10px;overflow:hidden}.canvasWrap:hover{border-color:#4edfff}.zoomLayer{position:relative;transform-origin:center center}.canvasWrap canvas.base{width:100%;height:auto;background:#020711;border-radius:12px;display:block}.canvasWrap canvas.hover{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;border-radius:12px}.badge{position:absolute;left:18px;top:18px;background:#071226dd;border:1px solid #31517e;border-radius:999px;padding:7px 11px;font-size:12px;z-index:3}.zoomBadge{position:absolute;right:18px;top:18px;background:#071226dd;border:1px solid #31517e;border-radius:999px;padding:7px 11px;font-size:12px;z-index:3}.cap{text-align:center;color:#bcd0f7;margin-top:8px}.hint{font-size:12px;color:#9fb4d9;margin-top:6px}.cursorMsg{font-size:12px;color:#ffd98e;margin-top:8px}.pointsBox{max-height:260px;overflow:auto;border:1px solid #29436d;border-radius:12px;padding:8px;margin-top:8px}.pill{display:block;border:1px solid #31517e;border-radius:12px;padding:7px 9px;margin:4px 0;color:#dff8ff;background:#071226}.pill b{color:#fff}.list{margin-top:14px;border-top:1px solid #2a416b;padding-top:10px}.item{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #22365f;color:#d7e6ff}.smallbtn{width:auto;padding:7px 10px;font-size:12px;margin:0;border-radius:10px}.selectInfo{padding:10px;border:1px solid #51461d;background:#1e1a0b;border-radius:12px;margin-top:8px;color:#ffeaa0}.pointMark{position:absolute;width:22px;height:22px;border:3px solid var(--red);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(255,75,110,.8);pointer-events:none;z-index:4}@media(max-width:1100px){main{grid-template-columns:1fr;padding:12px}.previewGrid{grid-template-columns:1fr}}
</style></head><body>
<header><h1>Vision PoC Master v12 / 投影線画＋複数線分選択</h1><div class="sub">通常クリック＝閉ループ/連結線を選択。Shift＋クリック＝単線を複数追加/解除。ESC＝選択解除、Enter＝登録確定。</div></header>
<main><section class="card">
<label>品番</label><input id="partNo" placeholder="例：BRKT-001-LH">
<label>品名・メモ</label><input id="memo" placeholder="例：ブラケットLH 上面＋正面検査">
<div class="row"><div><label>検査に使う側面</label><select id="sideChoice"><option value="front">正面</option><option value="side">側面</option></select></div><div><label>線画</label><select id="mode"><option value="edges">外形/折れ線エッジ</option><option value="wire">全メッシュ線</option></select></div></div>
<label>線の太さ</label><select id="lineWidth"><option value="2">細い</option><option value="3" selected>標準</option><option value="5">太い</option></select>
<div id="drop" class="drop">STLをここにドラッグ＆ドロップ<br>または下から選択</div><input id="fileInput" type="file" accept=".stl,model/stl">
<button id="pointModeBtn" class="secondary">検査ポイント追加モード：OFF</button>
<div id="pointHelp" class="hint">OFF中。ONにすると選択できます。Ctrl＋ホイールで拡大縮小。</div>
<div id="selectInfo" class="selectInfo">未選択</div>
<div class="row"><button id="commitSelBtn" class="good">選択範囲を検査ポイント登録</button><button id="clearSelBtn" class="secondary">選択解除</button></div>
<div id="points" class="pointsBox">検査ポイントなし</div>
<button id="saveBtn" class="good">この品番で登録</button><button id="exportBtn" class="secondary">マスターJSONを書き出し</button>
<label>マスターJSON読込</label><input id="importInput" type="file" accept=".json,application/json"><button id="clearBtn" class="danger">全マスター削除</button>
<div id="status" class="status">未読込</div><div id="list" class="list"></div>
</section><section class="card"><div class="previewGrid">
<div class="canvasWrap" data-view="top"><span class="badge">上面</span><span class="zoomBadge" id="topZoom">100%</span><div class="zoomLayer" id="topLayer"><canvas class="base" id="topCanvas" width="760" height="760"></canvas><canvas class="hover" id="topHover" width="760" height="760"></canvas><div id="topPts"></div></div><div class="cap">上面</div><div class="cursorMsg" id="topHint">-</div></div>
<div class="canvasWrap" data-view="front"><span class="badge">正面</span><span class="zoomBadge" id="frontZoom">100%</span><div class="zoomLayer" id="frontLayer"><canvas class="base" id="frontCanvas" width="760" height="760"></canvas><canvas class="hover" id="frontHover" width="760" height="760"></canvas><div id="frontPts"></div></div><div class="cap">正面</div><div class="cursorMsg" id="frontHint">-</div></div>
<div class="canvasWrap" data-view="side"><span class="badge">側面</span><span class="zoomBadge" id="sideZoom">100%</span><div class="zoomLayer" id="sideLayer"><canvas class="base" id="sideCanvas" width="760" height="760"></canvas><canvas class="hover" id="sideHover" width="760" height="760"></canvas><div id="sidePts"></div></div><div class="cap">側面</div><div class="cursorMsg" id="sideHint">-</div></div>
</div></section></main>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import { STLLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js';
const DB_KEY='visionPocMasters.v12'; const LEGACY_KEYS=['visionPocMasters.v11','visionPocMasters.v10','visionPocMasters.v9']; const $=id=>document.getElementById(id);
const canvases={top:$('topCanvas'),front:$('frontCanvas'),side:$('sideCanvas')}; const hoverCanvases={top:$('topHover'),front:$('frontHover'),side:$('sideHover')}; const planes={top:'xy',front:'xz',side:'yz'};
let current=null, pointMode=false, points=[], segments={top:[],front:[],side:[]}, zoom={top:1,front:1,side:1}; let pending=null;
function getDB(){for(const k of [DB_KEY,...LEGACY_KEYS]){try{const v=localStorage.getItem(k); if(v) return JSON.parse(v)}catch(e){}} return {}}
function setDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))} function log(s){$('status').textContent=s} function prevent(e){e.preventDefault();e.stopPropagation()}
['dragenter','dragover','dragleave','drop'].forEach(ev=>window.addEventListener(ev,prevent,false)); $('drop').addEventListener('dragover',e=>{$('drop').classList.add('drag');prevent(e)}); $('drop').addEventListener('dragleave',e=>{$('drop').classList.remove('drag');prevent(e)}); $('drop').addEventListener('drop',e=>{prevent(e);$('drop').classList.remove('drag');const f=e.dataTransfer.files?.[0]; if(f)loadFile(f)}); $('fileInput').addEventListener('change',e=>{const f=e.target.files?.[0]; if(f)loadFile(f)});
async function loadFile(file){log('STL読込中: '+file.name); try{const buf=await file.arrayBuffer(); const geom=new STLLoader().parse(buf); geom.computeVertexNormals(); geom.computeBoundingBox(); current={fileName:file.name,geometry:geom}; points=[]; pending=null; renderAll(); renderPoints(); drawAllHover(); log('STL読込OK: '+file.name+'\n通常クリック=閉ループ/連結、Shift+クリック=単線追加/解除。ESC=選択解除、Enter=登録。')}catch(err){console.error(err);log('STL読込エラー: '+err.message)}}
function makeLineGeometry(g){ if($('mode').value==='wire') return new THREE.WireframeGeometry(g); let e=new THREE.EdgesGeometry(g,8); const count=e.getAttribute('position')?.count||0; if(count<2) e=new THREE.WireframeGeometry(g); return e }
function projectPoint(x,y,z,plane){ if(plane==='xz')return[x,z]; if(plane==='yz')return[y,z]; return[x,y] }
function drawProjection(view){ const canvas=canvases[view], geometry=current.geometry, plane=planes[view], ctx=canvas.getContext('2d'); const w=canvas.width,h=canvas.height,pad=56; ctx.fillStyle='#020711';ctx.fillRect(0,0,w,h); segments[view]=[]; const eg=makeLineGeometry(geometry), pos=eg.getAttribute('position'); if(!pos||pos.count<2){$(view+'Hint').textContent='線データなし';return}
 let pts=[]; for(let i=0;i<pos.count;i++) pts.push(projectPoint(pos.getX(i),pos.getY(i),pos.getZ(i),plane)); let minU=Infinity,maxU=-Infinity,minV=Infinity,maxV=-Infinity; for(const [u,v] of pts){minU=Math.min(minU,u);maxU=Math.max(maxU,u);minV=Math.min(minV,v);maxV=Math.max(maxV,v)} let spanU=maxU-minU, spanV=maxV-minV; if(spanU<1e-6)spanU=1; if(spanV<1e-6)spanV=1; const scale=Math.min((w-pad*2)/spanU,(h-pad*2)/spanV); const cx=(minU+maxU)/2, cy=(minV+maxV)/2; const map=([u,v])=>[w/2+(u-cx)*scale,h/2-(v-cy)*scale];
 ctx.strokeStyle='#31dcff'; ctx.lineWidth=Number($('lineWidth').value||3); ctx.lineCap='round'; ctx.lineJoin='round'; for(let i=0;i<pts.length;i+=2){const a=map(pts[i]),b=map(pts[i+1]); segments[view].push([a[0],a[1],b[0],b[1]]); ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke()} $(view+'Hint').textContent='線分 '+segments[view].length+'本'}
function renderAll(){if(!current)return; ['top','front','side'].forEach(drawProjection); renderPoints()} $('mode').addEventListener('change',()=>{renderAll();pending=null;drawAllHover()}); $('lineWidth').addEventListener('change',()=>{renderAll();drawAllHover()});
function distToSeg(px,py,s){const[x1,y1,x2,y2]=s;const vx=x2-x1,vy=y2-y1,wx=px-x1,wy=py-y1,c1=vx*wx+vy*wy,c2=vx*vx+vy*vy;let t=c2?c1/c2:0;t=Math.max(0,Math.min(1,t));const x=x1+t*vx,y=y1+t*vy;return Math.hypot(px-x,py-y)}
function findNearest(view,x,y){let best=-1,bd=18/zoom[view];segments[view].forEach((s,i)=>{const d=distToSeg(x,y,s);if(d<bd){bd=d;best=i}});return best}
function keyPt(x,y){return Math.round(x/3)+','+Math.round(y/3)}
function connectedSet(view,start){ if(start<0)return[]; const segs=segments[view]; const map=new Map(); segs.forEach((s,i)=>{const a=keyPt(s[0],s[1]),b=keyPt(s[2],s[3]); if(!map.has(a))map.set(a,[]); if(!map.has(b))map.set(b,[]); map.get(a).push(i); map.get(b).push(i)}); const seen=new Set([start]), stack=[start]; while(stack.length){const i=stack.pop(),s=segs[i]; for(const k of [keyPt(s[0],s[1]),keyPt(s[2],s[3])]){for(const ni of map.get(k)||[]){if(!seen.has(ni)&&seen.size<700){seen.add(ni);stack.push(ni)}}}} return [...seen] }
function bboxFor(view,idxs){const ss=idxs.map(i=>segments[view][i]).filter(Boolean); let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity; for(const s of ss){minX=Math.min(minX,s[0],s[2]);minY=Math.min(minY,s[1],s[3]);maxX=Math.max(maxX,s[0],s[2]);maxY=Math.max(maxY,s[1],s[3])} return {ss,bbox:{minX,minY,maxX,maxY},cx:(minX+maxX)/2,cy:(minY+maxY)/2} }
function clearHover(view){const c=hoverCanvases[view];c.getContext('2d').clearRect(0,0,c.width,c.height)} function drawAllHover(){['top','front','side'].forEach(v=>drawHover(v,null))}
function drawHover(view,preview){const c=hoverCanvases[view],ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height); if(pending&&pending.view===view) drawSelection(ctx,pending.indices.map(i=>segments[view][i]),'#ffe35b',7,true); if(preview&&preview.indices.length) drawSelection(ctx,preview.indices.map(i=>segments[view][i]),'#ff315c',6,false)}
function drawSelection(ctx,ss,color,lw,box){ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity; for(const s of ss){if(!s)continue;ctx.beginPath();ctx.moveTo(s[0],s[1]);ctx.lineTo(s[2],s[3]);ctx.stroke(); minX=Math.min(minX,s[0],s[2]);minY=Math.min(minY,s[1],s[3]);maxX=Math.max(maxX,s[0],s[2]);maxY=Math.max(maxY,s[1],s[3])} if(box&&isFinite(minX)){ctx.strokeStyle='#fff16d';ctx.lineWidth=3;ctx.strokeRect(minX-8,minY-8,(maxX-minX)+16,(maxY-minY)+16)}}
function canvasPoint(e,view){const canvas=canvases[view], r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*canvas.width,y:(e.clientY-r.top)/r.height*canvas.height}}
function updateSelectInfo(){ if(!pending){$('selectInfo').textContent='未選択';return} const name=pending.view==='top'?'上面':pending.view==='front'?'正面':'側面'; $('selectInfo').textContent=`選択中：${name} / 線分 ${pending.indices.length}本（${pending.mode}）\nShift＋クリックで単線を追加/解除。通常クリックで閉ループ/連結選択に置換。ESCで解除、Enterで登録。`; }
document.querySelectorAll('.canvasWrap').forEach(w=>{const view=w.dataset.view; w.addEventListener('wheel',e=>{if(!e.ctrlKey)return;prevent(e);const dir=e.deltaY<0?1.12:1/1.12;zoom[view]=Math.max(.5,Math.min(10,zoom[view]*dir));$(view+'Layer').style.transform=`scale(${zoom[view]})`;$(view+'Zoom').textContent=Math.round(zoom[view]*100)+'%'}); w.addEventListener('mousemove',e=>{const p=canvasPoint(e,view), best=findNearest(view,p.x,p.y); let idxs=[]; if(best>=0) idxs=e.shiftKey?[best]:connectedSet(view,best); drawHover(view,{indices:idxs}); $(view+'Hint').textContent=(best>=0?(e.shiftKey?'単線候補':'閉ループ/連結候補'):'近くに線なし')}); w.addEventListener('mouseleave',()=>drawHover(view,null)); w.addEventListener('click',e=>{if(!pointMode)return;const p=canvasPoint(e,view), best=findNearest(view,p.x,p.y); if(best<0){alert('近くに線がありません');return} if(e.shiftKey){ if(!pending||pending.view!==view) pending={view,indices:[],mode:'単線複数'}; if(!pending.indices.includes(best)) pending.indices.push(best); else pending.indices=pending.indices.filter(i=>i!==best); } else { pending={view,indices:connectedSet(view,best),mode:'閉ループ/連結'}; } updateSelectInfo(); drawAllHover();});});
$('pointModeBtn').onclick=()=>{pointMode=!pointMode;$('pointModeBtn').textContent='検査ポイント追加モード：'+(pointMode?'ON':'OFF');$('pointModeBtn').classList.toggle('active',pointMode);$('pointHelp').textContent=pointMode?'ON中：通常クリックで閉ループ/連結選択。Shift＋クリックで単線を複数追加。最後に登録ボタンで確定。':'OFF中。ONにすると選択できます。Ctrl＋ホイールで拡大縮小。'};
$('clearSelBtn').onclick=()=>{pending=null;updateSelectInfo();drawAllHover()}; $('commitSelBtn').onclick=commitSelection; function commitSelection(){if(!pending||!pending.indices.length){alert('選択範囲がありません');return} const view=pending.view, c=canvases[view]; const info=bboxFor(view,pending.indices); const name=prompt('検査ポイント名',view==='top'?'穴A':'重要部位'); if(!name)return; const type=prompt('種別（穴/ナット/切欠き/自由）','穴')||'自由'; points.push({view,name,type,tol:.055,selection:pending.mode,segments:info.ss.map(s=>s.map((v,i)=>i%2===0?v/c.width:v/c.height)),bbox:{minX:info.bbox.minX/c.width,minY:info.bbox.minY/c.height,maxX:info.bbox.maxX/c.width,maxY:info.bbox.maxY/c.height},x:info.cx/c.width,y:info.cy/c.height}); pending=null;updateSelectInfo();drawAllHover();renderPoints()} document.addEventListener('keydown',e=>{if(e.key==='Escape'){pending=null;updateSelectInfo();drawAllHover()} if(e.key==='Enter'&&pending&&pending.indices.length){e.preventDefault();commitSelection()}});
function renderPoints(){['top','front','side'].forEach(v=>{$(v+'Pts').innerHTML=''}); points.forEach((p,i)=>{const el=document.createElement('div');el.className='pointMark';el.title=p.name;el.style.left=(p.x*100)+'%';el.style.top=(p.y*100)+'%';$(p.view+'Pts').appendChild(el)}); $('points').innerHTML=points.length?points.map((p,i)=>`<span class="pill"><b>${i+1}. ${p.view==='top'?'上面':p.view==='front'?'正面':'側面'}</b> / ${p.type} / ${p.name} / ${p.selection} / 線${p.segments?.length||0}本 <button class="smallbtn danger" data-i="${i}">削除</button></span>`).join(''):'検査ポイントなし'; document.querySelectorAll('button[data-i]').forEach(b=>b.onclick=()=>{points.splice(Number(b.dataset.i),1);renderPoints()}) }
$('saveBtn').onclick=()=>{const partNo=$('partNo').value.trim(); if(!partNo){alert('品番を入れて');return} if(!current){alert('STLを読み込んで');return} const db=getDB(); db[partNo]={version:12,partNo,memo:$('memo').value.trim(),fileName:current.fileName,top:canvases.top.toDataURL('image/png'),front:canvases.front.toDataURL('image/png'),side:canvases.side.toDataURL('image/png'),sideChoice:$('sideChoice').value,points,createdAt:new Date().toISOString(),mode:$('mode').value}; try{setDB(db);log('登録OK: '+partNo+'\ninspect_render_v12.htmlで使えます。');renderList()}catch(e){console.error(e);alert('保存容量エラー。JSON書き出し運用にしてください。')}};
$('exportBtn').onclick=()=>{const db=getDB();const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vision-master-v12.json';a.click();URL.revokeObjectURL(a.href)}; $('importInput').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;const db=JSON.parse(await f.text());setDB(db);renderList();log('JSON読込OK')}); $('clearBtn').onclick=()=>{if(confirm('全マスター削除？')){localStorage.removeItem(DB_KEY);renderList();log('全削除しました')}};
function renderList(){const db=getDB();const keys=Object.keys(db);$('list').innerHTML='<b>登録済み: '+keys.length+'件</b>'+keys.map(k=>`<div class="item"><span>${k}<br><small>${db[k].memo||''}</small></span><button class="smallbtn danger" data-k="${k}">削除</button></div>`).join('');document.querySelectorAll('button[data-k]').forEach(b=>b.onclick=()=>{const db=getDB();delete db[b.dataset.k];setDB(db);renderList()})} renderList(); updateSelectInfo();
</script></body></html>

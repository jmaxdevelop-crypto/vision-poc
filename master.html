<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vision PoC v20 Master / 基準点方式</title>
<style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--cyan:#31d7ff;--txt:#eef6ff;--muted:#9fb4d9;--yellow:#ffd84a;--red:#ff4a6a;--green:#4dff99}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#071225,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
header{padding:16px 22px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{margin:0;font-size:21px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
main{display:grid;grid-template-columns:420px 1fr;gap:20px;padding:20px;max-width:1450px;margin:auto}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
label{display:block;color:#bcd0f7;font-size:13px;margin:12px 0 6px}input,select,textarea{width:100%;padding:12px 14px;border-radius:13px;border:1px solid #31517e;background:#071226;color:var(--txt);font-size:16px}button{border:0;border-radius:13px;padding:13px 14px;margin:8px 6px 0 0;font-weight:800;font-size:15px;color:#001225;background:linear-gradient(90deg,#2aa7ff,#39e0ff);cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.danger{background:#55273a;color:#fff}button.active{background:linear-gradient(90deg,#ffd84a,#ff9d2a);color:#1b1000}.row{display:flex;gap:8px;flex-wrap:wrap}.row button{flex:1}.drop{border:2px dashed #6d8dd0;border-radius:16px;height:130px;display:flex;align-items:center;justify-content:center;text-align:center;color:#cfe0ff;margin-top:12px;background:#17223c}.drop.drag{background:#22365f;border-color:var(--cyan)}
.status{margin-top:12px;color:#bcd0f7;font-size:13px;white-space:pre-line;line-height:1.55}.stage{position:relative;background:#030812;border:1px solid #27436f;border-radius:16px;overflow:hidden;height:72vh;min-height:520px}.stage canvas{position:absolute;left:0;top:0;width:100%;height:100%;display:block}.hint{font-size:12px;color:#a9bde6;margin-top:8px}.list{margin-top:12px;border-top:1px solid #2a416b;padding-top:8px;max-height:280px;overflow:auto}.item{padding:8px;border-bottom:1px solid #22365f;color:#d7e6ff;font-size:13px}.badge{display:inline-block;border-radius:999px;padding:2px 8px;margin-right:6px;font-weight:800;font-size:11px}.base{background:#ffd84a;color:#1b1000}.inspect{background:#ff4a6a;color:#fff}.jsonbox{font-size:12px;height:120px}.small{font-size:12px;color:#a9bde6}
@media(max-width:900px){main{grid-template-columns:1fr;padding:10px}.stage{height:60vh}}
</style>
</head>
<body>
<header><h1>Vision PoC v20 Master / CAD基準点方式</h1><div class="sub">STL→CAD線画。基準点を3点以上、検査ポイントを必要箇所に登録。Windowsで作ってJSONをSheet/GitHub共有する想定。</div></header>
<main>
<section class="card">
<label>品番</label><input id="partNo" placeholder="例：BRKT-001">
<label>メモ</label><input id="memo" placeholder="例：穴A＋耳部確認">
<label>面</label><select id="viewSel"><option value="top">上面</option><option value="front">正面</option></select>
<div class="drop" id="drop">STLをドラッグ＆ドロップ<br>または下から選択</div>
<input id="fileInput" type="file" accept=".stl">
<div class="row">
<button id="baseMode">基準点追加</button>
<button id="inspectMode">検査点追加</button>
</div>
<div class="row">
<button id="undoBtn" class="secondary">1個戻す</button>
<button id="clearPtsBtn" class="danger">点全削除</button>
</div>
<label>点名称</label><input id="pointName" placeholder="例：穴A / 角B / 耳部C">
<div class="row">
<button id="saveBtn">この品番で登録</button>
<button id="exportBtn" class="secondary">JSON書き出し</button>
</div>
<label>JSON読込</label><input id="importInput" type="file" accept=".json,application/json">
<div id="status" class="status">未読込</div>
<div class="hint">操作：Ctrl＋ホイール＝拡大縮小 / ホイール押しドラッグ＝パン / ESC＝選択モード解除。<br>基準点は最低3点推奨。穴中心・角・切欠き先端など。</div>
<div id="list" class="list"></div>
<label>登録JSONプレビュー</label><textarea id="jsonPreview" class="jsonbox" readonly></textarea>
</section>
<section class="card">
<div class="stage" id="stage"><canvas id="cadCanvas" width="1200" height="800"></canvas><canvas id="overlayCanvas" width="1200" height="800"></canvas></div>
</section>
</main>
<script type="module">
import { STLLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/STLLoader.js';
const DB_KEY='visionPocV20FeatureMaster';
const $=id=>document.getElementById(id);
const cad=$('cadCanvas'), ov=$('overlayCanvas'), cctx=cad.getContext('2d'), octx=ov.getContext('2d');
let geometry=null, segments={top:[],front:[]}, points={top:[],front:[]}, mode=null, zoom=1, pan={x:0,y:0}, isPan=false, last={x:0,y:0};
function log(s){$('status').textContent=s}
function prevent(e){e.preventDefault(); e.stopPropagation()}
['dragenter','dragover','dragleave','drop'].forEach(ev=>window.addEventListener(ev,prevent,false));
$('drop').addEventListener('dragover',e=>{$('drop').classList.add('drag')});$('drop').addEventListener('dragleave',e=>{$('drop').classList.remove('drag')});$('drop').addEventListener('drop',e=>{prevent(e);$('drop').classList.remove('drag');const f=e.dataTransfer.files?.[0]; if(f) loadSTL(f)});
$('fileInput').addEventListener('change',e=>{const f=e.target.files?.[0]; if(f) loadSTL(f)});
async function loadSTL(file){try{log('STL読込中: '+file.name); const buf=await file.arrayBuffer(); geometry=new STLLoader().parse(buf); geometry.computeBoundingBox(); segments.top=projectSegments(geometry,'top'); segments.front=projectSegments(geometry,'front'); fitView(); draw(); log('STL読込OK。基準点/検査点を登録してください。')}catch(err){console.error(err);log('STL読込失敗: '+err.message)}}
function projectSegments(g,view){
 const pos=g.attributes.position.array; const raw=[]; let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
 function p(i){const x=pos[i],y=pos[i+1],z=pos[i+2]; return view==='top'?{x,y}:{x,y:z};}
 for(let i=0;i<pos.length;i+=9){const a=p(i),b=p(i+3),c=p(i+6); [[a,b],[b,c],[c,a]].forEach(([u,v])=>{raw.push({x1:u.x,y1:u.y,x2:v.x,y2:v.y}); minX=Math.min(minX,u.x,v.x); maxX=Math.max(maxX,u.x,v.x); minY=Math.min(minY,u.y,v.y); maxY=Math.max(maxY,u.y,v.y);});}
 const w=maxX-minX||1,h=maxY-minY||1; return raw.map(s=>({x1:(s.x1-minX)/w,y1:1-(s.y1-minY)/h,x2:(s.x2-minX)/w,y2:1-(s.y2-minY)/h}));
}
function currentView(){return $('viewSel').value}
$('viewSel').onchange=()=>draw();
function fitView(){zoom=0.86; pan={x:0,y:0}}
function mapPt(p){const W=cad.width,H=cad.height; const s=Math.min(W,H)*zoom; return {x:W/2+pan.x+(p.x-.5)*s,y:H/2+pan.y+(p.y-.5)*s};}
function invPt(x,y){const r=cad.getBoundingClientRect(), W=cad.width,H=cad.height; const cx=(x-r.left)*W/r.width, cy=(y-r.top)*H/r.height; const s=Math.min(W,H)*zoom; return {x:(cx-W/2-pan.x)/s+.5,y:(cy-H/2-pan.y)/s+.5};}
function draw(){cctx.clearRect(0,0,cad.width,cad.height);octx.clearRect(0,0,ov.width,ov.height); cctx.fillStyle='#020711';cctx.fillRect(0,0,cad.width,cad.height); const segs=segments[currentView()]||[]; cctx.strokeStyle='#31d7ff';cctx.lineWidth=1.3; cctx.beginPath(); segs.forEach(s=>{const a=mapPt({x:s.x1,y:s.y1}),b=mapPt({x:s.x2,y:s.y2}); cctx.moveTo(a.x,a.y);cctx.lineTo(b.x,b.y)}); cctx.stroke(); drawPoints(); updatePreview();}
function drawPoints(){const arr=points[currentView()]||[]; arr.forEach((p,i)=>{const m=mapPt(p); octx.beginPath(); octx.arc(m.x,m.y,p.type==='base'?9:12,0,Math.PI*2); octx.fillStyle=p.type==='base'?'#ffd84a':'#ff4a6a'; octx.globalAlpha=.85; octx.fill(); octx.globalAlpha=1; octx.fillStyle=p.type==='base'?'#1b1000':'#fff'; octx.font='bold 12px system-ui'; octx.fillText((i+1),m.x-4,m.y+4); octx.fillStyle='#fff'; octx.fillText(p.name||p.type,m.x+12,m.y-12);});}
function setMode(m){mode=mode===m?null:m; $('baseMode').classList.toggle('active',mode==='base'); $('inspectMode').classList.toggle('active',mode==='inspect');}
$('baseMode').onclick=()=>setMode('base'); $('inspectMode').onclick=()=>setMode('inspect'); document.addEventListener('keydown',e=>{if(e.key==='Escape')setMode(null)});
ov.addEventListener('mousedown',e=>{if(e.button===1){isPan=true;last={x:e.clientX,y:e.clientY};e.preventDefault();}}); window.addEventListener('mouseup',()=>isPan=false); window.addEventListener('mousemove',e=>{if(isPan){pan.x+=e.clientX-last.x;pan.y+=e.clientY-last.y;last={x:e.clientX,y:e.clientY};draw();}});
ov.addEventListener('wheel',e=>{if(e.ctrlKey){e.preventDefault();zoom*=e.deltaY<0?1.12:.89;zoom=Math.max(.15,Math.min(8,zoom));draw();}}, {passive:false});
ov.addEventListener('click',e=>{if(!mode)return; const p=invPt(e.clientX,e.clientY); if(p.x<-.2||p.x>1.2||p.y<-.2||p.y>1.2)return; const name=$('pointName').value.trim()|| (mode==='base'?'基準点':'検査点')+(points[currentView()].length+1); points[currentView()].push({type:mode,name,x:p.x,y:p.y}); $('pointName').value=''; draw();});
$('undoBtn').onclick=()=>{points[currentView()].pop();draw()}; $('clearPtsBtn').onclick=()=>{if(confirm('この面の点を全削除？')){points[currentView()]=[];draw()}};
function updatePreview(){const partNo=$('partNo').value.trim(); const data={partNo,memo:$('memo').value.trim(),type:'cad-feature-v20',points,createdAt:new Date().toISOString()}; $('jsonPreview').value=JSON.stringify(data,null,2); renderList();}
function getDB(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch(e){return {}}} function setDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db))}
$('saveBtn').onclick=()=>{const partNo=$('partNo').value.trim(); if(!partNo)return alert('品番入れて'); if(!segments.top.length)return alert('STL読んで'); const db=getDB(); db[partNo]={partNo,memo:$('memo').value.trim(),type:'cad-feature-v20',segments,points,createdAt:new Date().toISOString()}; setDB(db); log('登録OK: '+partNo+'\n※端末共有はJSON書き出し/GAS連携で対応'); renderList();};
$('exportBtn').onclick=()=>{const db=getDB(); const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vision-feature-master-v20.json'; a.click(); URL.revokeObjectURL(a.href)};
$('importInput').onchange=async e=>{const f=e.target.files?.[0]; if(!f)return; const db=JSON.parse(await f.text()); setDB(db); log('JSON読込OK'); renderList();};
function renderList(){const arr=points[currentView()]||[]; $('list').innerHTML='<b>'+currentView()+' 点一覧</b>'+arr.map((p,i)=>`<div class="item"><span class="badge ${p.type==='base'?'base':'inspect'}">${p.type==='base'?'基準':'検査'}</span>${i+1}. ${p.name} <span class="small">(${p.x.toFixed(3)}, ${p.y.toFixed(3)})</span></div>`).join('');}
renderList();
</script>
</body></html>

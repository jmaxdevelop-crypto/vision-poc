<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Image Match PoC v1</title>
<style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--cyan:#31d7ff;--txt:#eef6ff;--muted:#9fb4d9;--ok:#29f58a;--ng:#ff3b55;--warn:#ffd447}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#061022,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
header{padding:18px 22px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{margin:0;font-size:22px}.sub{color:var(--muted);font-size:13px;margin-top:5px}
main{max-width:1500px;margin:auto;padding:18px;display:grid;grid-template-columns:360px 1fr;gap:18px}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
button{width:100%;border:0;border-radius:14px;padding:14px 16px;margin:8px 0;font-weight:800;font-size:16px;color:#001225;background:linear-gradient(90deg,#2aa7ff,#39e0ff);cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.warn{background:#634c1b;color:#fff}input[type=file]{width:100%;padding:12px;background:#071226;color:#fff;border:1px solid #31517e;border-radius:12px}label{display:block;color:#bcd0f7;font-size:13px;margin:14px 0 6px}input[type=range]{width:100%}.status{white-space:pre-line;background:#071226;border:1px solid #243d66;border-radius:14px;padding:12px;margin-top:12px;color:#d7e6ff;font-family:ui-monospace,monospace;font-size:13px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.pane{background:#071226;border:1px solid #27436f;border-radius:16px;padding:12px;min-width:0}.pane h2{font-size:15px;margin:0 0 8px;color:#dff8ff}canvas{width:100%;height:auto;background:#020711;border-radius:12px;display:block}.big{grid-column:1/-1}.score{font-size:42px;font-weight:900;margin:10px 0}.ok{color:var(--ok)}.ng{color:var(--ng)}.legend{font-size:13px;color:#bcd0f7;line-height:1.7}.sw{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:-1px}.green{background:#29f58a}.red{background:#ff3b55}.blue{background:#39a8ff}.yellow{background:#ffd447}
@media(max-width:900px){main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>画像ベース検査 PoC v1 / 外郭＋エッジ比較</h1><div class="sub">白紙背景の部品画像を、AIなしで「部品抽出→正規化→エッジ比較」する試作です。まず可能性確認用。</div></header>
<main>
<section class="card">
  <button id="makeMaster">添付画像をマスターにする</button>
  <button id="sameInspect" class="secondary">同じ画像で検査</button>
  <button id="fakeNg" class="warn">疑似NGを作って検査</button>
  <label>検査画像を選択</label><input id="file" type="file" accept="image/*" />
  <label>部品抽出しきい値: <span id="thrVal">110</span></label><input id="thr" type="range" min="50" max="180" value="110" />
  <label>エッジ感度: <span id="edgeVal">55</span></label><input id="edgeThr" type="range" min="20" max="160" value="55" />
  <label>許容ズレ半径(px): <span id="radVal">4</span></label><input id="radius" type="range" min="0" max="12" value="4" />
  <button id="reanalyze" class="secondary">再解析</button>
  <div id="score" class="score">--%</div>
  <div class="legend">
    <span class="sw green"></span>一致したマスターエッジ<br>
    <span class="sw red"></span>マスターにあるが検査画像に無い<br>
    <span class="sw blue"></span>検査画像に余分にあるエッジ<br>
    <span class="sw yellow"></span>検出した部品外郭
  </div>
  <div id="status" class="status">未解析</div>
</section>
<section class="card">
  <div class="grid">
    <div class="pane"><h2>1. マスター画像</h2><canvas id="masterRaw" width="900" height="650"></canvas></div>
    <div class="pane"><h2>2. 検査画像</h2><canvas id="inspectRaw" width="900" height="650"></canvas></div>
    <div class="pane"><h2>3. マスター正規化エッジ</h2><canvas id="masterEdge" width="900" height="520"></canvas></div>
    <div class="pane"><h2>4. 検査正規化エッジ</h2><canvas id="inspectEdge" width="900" height="520"></canvas></div>
    <div class="pane big"><h2>5. 差分表示</h2><canvas id="diff" width="900" height="520"></canvas></div>
  </div>
</section>
</main>

const W=900,H=650,NW=900,NH=520;
const $=id=>document.getElementById(id);
let masterImg=null, inspectImg=null, masterResult=null, inspectResult=null;
function log(s){$('status').textContent=s}
function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src;})}
function drawFit(canvas,img){const ctx=canvas.getContext('2d');ctx.fillStyle='#020711';ctx.fillRect(0,0,canvas.width,canvas.height);const s=Math.min(canvas.width/img.width,canvas.height/img.height);const w=img.width*s,h=img.height*s,x=(canvas.width-w)/2,y=(canvas.height-h)/2;ctx.drawImage(img,x,y,w,h);return {x,y,w,h,s}}
function getFitImageData(img,w=W,h=H){const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='white';ctx.fillRect(0,0,w,h);const s=Math.min(w/img.width,h/img.height);const dw=img.width*s,dh=img.height*s,x=(w-dw)/2,y=(h-dh)/2;ctx.drawImage(img,x,y,dw,dh);return {canvas:c,ctx,imgData:ctx.getImageData(0,0,w,h)}}
function grayAt(d,i){return 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]}
function largestComponent(mask,w,h){const seen=new Uint8Array(w*h);let best=[];const qx=new Int32Array(w*h),qy=new Int32Array(w*h);for(let y=0;y<h;y++){for(let x=0;x<w;x++){const idx=y*w+x;if(!mask[idx]||seen[idx])continue;let head=0,tail=0;qx[tail]=x;qy[tail++]=y;seen[idx]=1;let pts=[];while(head<tail){const cx=qx[head],cy=qy[head++];pts.push(cy*w+cx);const ns=[[1,0],[-1,0],[0,1],[0,-1]];for(const [dx,dy] of ns){const nx=cx+dx,ny=cy+dy;if(nx<0||ny<0||nx>=w||ny>=h)continue;const ni=ny*w+nx;if(mask[ni]&&!seen[ni]){seen[ni]=1;qx[tail]=nx;qy[tail++]=ny;}}}if(pts.length>best.length)best=pts;}}const out=new Uint8Array(w*h);for(const p of best)out[p]=1;return out;}
function bbox(mask,w,h){let minX=w,minY=h,maxX=0,maxY=0,n=0;for(let y=0;y<h;y++)for(let x=0;x<w;x++){if(mask[y*w+x]){n++;if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}}if(!n)return null;return {minX,minY,maxX,maxY,w:maxX-minX+1,h:maxY-minY+1,n}}
function analyze(img,rawCanvas){drawFit(rawCanvas,img);const thr=+$('thr').value, edgeT=+$('edgeThr').value;const {canvas,ctx,imgData}=getFitImageData(img,W,H);const d=imgData.data;const mask=new Uint8Array(W*H);for(let i=0,p=0;p<W*H;p++,i+=4){const g=grayAt(d,i); if(g<thr)mask[p]=1;}
const comp=largestComponent(mask,W,H);const b=bbox(comp,W,H);if(!b)throw new Error('部品抽出できません');
// draw yellow bbox/contour approximation on raw
const rctx=rawCanvas.getContext('2d');rctx.drawImage(canvas,0,0);rctx.strokeStyle='#ffd447';rctx.lineWidth=4;rctx.strokeRect(b.minX,b.minY,b.w,b.h);
// normalize crop to NW/NH preserving aspect
const norm=document.createElement('canvas');norm.width=NW;norm.height=NH;const nctx=norm.getContext('2d');nctx.fillStyle='#020711';nctx.fillRect(0,0,NW,NH);const pad=18;const s=Math.min((NW-pad*2)/b.w,(NH-pad*2)/b.h);const dw=b.w*s,dh=b.h*s,dx=(NW-dw)/2,dy=(NH-dh)/2;nctx.drawImage(canvas,b.minX,b.minY,b.w,b.h,dx,dy,dw,dh);
// edge on normalized grayscale
const nd=nctx.getImageData(0,0,NW,NH);const gd=new Float32Array(NW*NH);for(let i=0,p=0;p<NW*NH;p++,i+=4)gd[p]=grayAt(nd.data,i);
const edge=new Uint8Array(NW*NH);for(let y=1;y<NH-1;y++){for(let x=1;x<NW-1;x++){const p=y*NW+x;const gx=-gd[p-NW-1]-2*gd[p-1]-gd[p+NW-1]+gd[p-NW+1]+2*gd[p+1]+gd[p+NW+1];const gy=-gd[p-NW-1]-2*gd[p-NW]-gd[p-NW+1]+gd[p+NW-1]+2*gd[p+NW]+gd[p+NW+1];const mag=Math.sqrt(gx*gx+gy*gy);if(mag>edgeT)edge[p]=1;}}
return {edge,norm,bbox:b,count:edge.reduce((a,b)=>a+b,0)}}
function drawEdge(canvas,res,color='#31d7ff'){const ctx=canvas.getContext('2d');ctx.fillStyle='#020711';ctx.fillRect(0,0,NW,NH);const img=ctx.getImageData(0,0,NW,NH);const d=img.data;for(let p=0,i=0;p<NW*NH;p++,i+=4){if(res.edge[p]){d[i]=49;d[i+1]=215;d[i+2]=255;d[i+3]=255;}else{d[i]=2;d[i+1]=7;d[i+2]=17;d[i+3]=255;}}ctx.putImageData(img,0,0)}
function hasNearby(edge,x,y,r){for(let yy=y-r;yy<=y+r;yy++){if(yy<0||yy>=NH)continue;for(let xx=x-r;xx<=x+r;xx++){if(xx<0||xx>=NW)continue;if((xx-x)*(xx-x)+(yy-y)*(yy-y)<=r*r && edge[yy*NW+xx])return true;}}return false}
function compare(){if(!masterResult||!inspectResult)return;drawEdge($('masterEdge'),masterResult);drawEdge($('inspectEdge'),inspectResult);const r=+$('radius').value;const ctx=$('diff').getContext('2d');ctx.fillStyle='#020711';ctx.fillRect(0,0,NW,NH);const img=ctx.getImageData(0,0,NW,NH);const d=img.data;let total=0,matched=0,extra=0;for(let y=0;y<NH;y++){for(let x=0;x<NW;x++){const p=y*NW+x,i=p*4;if(masterResult.edge[p]){total++;if(hasNearby(inspectResult.edge,x,y,r)){matched++;d[i]=41;d[i+1]=245;d[i+2]=138;d[i+3]=255;}else{d[i]=255;d[i+1]=59;d[i+2]=85;d[i+3]=255;}}}
for(let y=0;y<NH;y++)for(let x=0;x<NW;x++){const p=y*NW+x,i=p*4;if(inspectResult.edge[p]&&!hasNearby(masterResult.edge,x,y,r)){extra++; if(d[i]===2||d[i]===0){d[i]=57;d[i+1]=168;d[i+2]=255;d[i+3]=180;}}}
ctx.putImageData(img,0,0);const score= total? matched/total*100:0;const el=$('score');el.textContent=score.toFixed(1)+'%';el.className='score '+(score>85?'ok':'ng');log(`マスターエッジ: ${masterResult.count}
検査エッジ: ${inspectResult.count}
一致: ${matched} / ${total}
余分エッジ: ${extra}
部品BBox Master: ${masterResult.bbox.w}x${masterResult.bbox.h}
部品BBox Inspect: ${inspectResult.bbox.w}x${inspectResult.bbox.h}`);}
async function makeMaster(){masterImg=await loadImage(sampleSrc);masterResult=analyze(masterImg,$('masterRaw'));drawEdge($('masterEdge'),masterResult);log('マスター生成OK');}
async function useSame(){if(!masterImg)await makeMaster();inspectImg=masterImg;inspectResult=analyze(inspectImg,$('inspectRaw'));compare();}
async function useFakeNg(){if(!masterImg)await makeMaster();const c=document.createElement('canvas');c.width=masterImg.width;c.height=masterImg.height;const ctx=c.getContext('2d');ctx.drawImage(masterImg,0,0);ctx.fillStyle='rgb(205,205,190)';ctx.fillRect(masterImg.width*0.43, masterImg.height*0.63, masterImg.width*0.12, masterImg.height*0.10);inspectImg=await loadImage(c.toDataURL('image/jpeg',0.9));inspectResult=analyze(inspectImg,$('inspectRaw'));compare();}
$('makeMaster').onclick=makeMaster;$('sameInspect').onclick=useSame;$('fakeNg').onclick=useFakeNg;$('reanalyze').onclick=()=>{try{if(masterImg)masterResult=analyze(masterImg,$('masterRaw'));if(inspectImg)inspectResult=analyze(inspectImg,$('inspectRaw'));compare();}catch(e){console.error(e);alert(e.message)}};
$('file').onchange=async e=>{const f=e.target.files[0];if(!f)return;inspectImg=await loadImage(URL.createObjectURL(f));if(!masterImg)await makeMaster();inspectResult=analyze(inspectImg,$('inspectRaw'));compare();};
for(const id of ['thr','edgeThr','radius'])$(id).oninput=()=>{$('thrVal').textContent=$('thr').value;$('edgeVal').textContent=$('edgeThr').value;$('radVal').textContent=$('radius').value;};
makeMaster().then(useSame);
</script>

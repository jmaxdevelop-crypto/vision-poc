<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Vision PoC - CAD Line Overlay</title>
<style>
  :root{--bg:#0b0f14;--panel:#121922;--line:#00ff88;--warn:#ff3355;--txt:#f4f7fb;--muted:#8fa1b3;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:Arial,"Hiragino Sans","Meiryo",sans-serif;overflow:hidden;}
  #app{height:100vh;display:grid;grid-template-rows:auto 1fr auto;}
  header{display:flex;gap:10px;align-items:center;padding:10px;background:#081018;border-bottom:1px solid #263445;flex-wrap:wrap;}
  input,button{font-size:16px;padding:11px 14px;border-radius:8px;border:1px solid #3a4a5d;background:#fff;color:#111;}
  button{cursor:pointer;font-weight:700;}
  button.primary{background:#0b84ff;color:#fff;border-color:#0b84ff;}
  button.ghost{background:#1a2532;color:#fff;}
  .status{font-weight:700;padding:9px 12px;border-radius:999px;background:#1d2a38;color:#cde0f5;}
  .status.ok{background:#063d25;color:#7cffb4;}
  .status.ng{background:#3d0614;color:#ff9aac;}
  main{position:relative;overflow:hidden;background:#05080c;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;}
  #overlayCanvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #hud{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.6);padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);min-width:240px;}
  #score{font-size:34px;font-weight:900;letter-spacing:.03em;}
  #drop{position:absolute;inset:18%;display:flex;align-items:center;justify-content:center;text-align:center;border:2px dashed #6e8194;border-radius:18px;background:rgba(8,16,24,.86);font-size:24px;font-weight:900;color:#dcecff;z-index:5;}
  #drop.hide{display:none;}
  #bigOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;font-size:18vw;font-weight:1000;z-index:20;color:#fff;text-shadow:0 8px 30px rgba(0,0,0,.5);}
  #bigOverlay.ok{display:flex;background:rgba(0,220,80,.72);}
  #bigOverlay.ng{display:flex;background:rgba(255,0,40,.72);}
  footer{display:flex;gap:8px;align-items:center;padding:8px 10px;background:#081018;border-top:1px solid #263445;color:#9db0c4;font-size:13px;}
  #hidden3d{display:none;}
</style>
</head>
<body>
<div id="app">
  <header>
    <input id="partNo" placeholder="品番入力" />
    <button class="primary" id="camBtn">カメラ起動</button>
    <button class="ghost" id="topBtn">上面</button>
    <button class="ghost" id="sideBtn">側面</button>
    <button id="resetBtn">リセット</button>
    <span id="phase" class="status">STL待ち</span>
  </header>

  <main id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="drop">STLをドラッグ＆ドロップ<br><small>上面・側面シルエットを自動生成します</small></div>
    <div id="hud">
      <div>VIEW: <b id="viewLabel">TOP</b></div>
      <div id="score">--%</div>
      <div>上面: <b id="topState">未</b> / 側面: <b id="sideState">未</b></div>
      <div style="color:#9db0c4;margin-top:4px;">CAD線画に実物を合わせる</div>
    </div>
  </main>

  <footer>
    PoC v3 / STL→CAD線画 / 動画フレーム簡易マッチング / 上面OK後に側面へ自動遷移
  </footer>
</div>
<div id="bigOverlay"></div>
<div id="hidden3d"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { STLLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/STLLoader.js';

const video = document.getElementById('video');
const overlay = document.getElementById('overlayCanvas');
const octx = overlay.getContext('2d', { willReadFrequently:true });
const drop = document.getElementById('drop');
const phaseEl = document.getElementById('phase');
const scoreEl = document.getElementById('score');
const viewLabel = document.getElementById('viewLabel');
const topState = document.getElementById('topState');
const sideState = document.getElementById('sideState');
const big = document.getElementById('bigOverlay');

let silhouettes = { top:null, side:null };
let currentView = 'top';
let topOK = false, sideOK = false;
let running = false;
let lastOkTime = 0;
let threshold = 0.62; // PoC用。現場では調整。

const work = document.createElement('canvas');
work.width = 240; work.height = 180;
const wctx = work.getContext('2d', { willReadFrequently:true });

function setPhase(text, cls=''){
  phaseEl.textContent = text;
  phaseEl.className = 'status ' + cls;
}

function resize(){
  overlay.width = overlay.clientWidth * devicePixelRatio;
  overlay.height = overlay.clientHeight * devicePixelRatio;
}
window.addEventListener('resize', resize); resize();

async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }, audio:false
    });
    video.srcObject = stream;
    running = true;
    setPhase(silhouettes.top ? '上面検査中' : 'カメラOK/STL待ち');
    requestAnimationFrame(loop);
  }catch(e){
    alert('カメラ起動失敗: ' + e.message);
  }
}

document.getElementById('camBtn').onclick = startCamera;
document.getElementById('topBtn').onclick = ()=>switchView('top');
document.getElementById('sideBtn').onclick = ()=>switchView('side');
document.getElementById('resetBtn').onclick = ()=>{
  topOK=false; sideOK=false; topState.textContent='未'; sideState.textContent='未'; switchView('top');
};

function switchView(v){
  currentView = v;
  viewLabel.textContent = v==='top' ? 'TOP' : 'SIDE';
  if(v==='top') setPhase(topOK ? '上面OK済' : '上面検査中');
  if(v==='side') setPhase(sideOK ? '側面OK済' : '側面検査中');
}

['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.style.borderColor='#00ff88';}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.style.borderColor='#6e8194';}));
drop.addEventListener('drop', async e=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.stl')){ alert('STLを入れてね'); return; }
  setPhase('STL解析中');
  const buf = await file.arrayBuffer();
  await buildSilhouettes(buf);
  drop.classList.add('hide');
  switchView('top');
  setPhase('上面検査中');
});

async function buildSilhouettes(arrayBuffer){
  const loader = new STLLoader();
  const geo = loader.parse(arrayBuffer);
  geo.computeBoundingBox();
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xffffff}));
  centerAndScale(mesh);
  silhouettes.top = renderSilhouette(mesh, 'top');
  silhouettes.side = renderSilhouette(mesh, 'side');
}

function centerAndScale(mesh){
  const box = new THREE.Box3().setFromObject(mesh);
  const center = new THREE.Vector3(); box.getCenter(center);
  mesh.position.sub(center);
  const size = new THREE.Vector3(); box.getSize(size);
  const maxDim = Math.max(size.x,size.y,size.z) || 1;
  mesh.scale.setScalar(2.6/maxDim);
}

function renderSilhouette(mesh, view){
  const W=512,H=512;
  const scene = new THREE.Scene();
  const clone = mesh.clone();
  scene.add(clone);
  const renderer = new THREE.WebGLRenderer({alpha:true, antialias:false, preserveDrawingBuffer:true});
  renderer.setSize(W,H,false);
  renderer.setClearColor(0x000000,0);
  const cam = new THREE.OrthographicCamera(-1.7,1.7,1.7,-1.7,0.1,10);
  if(view==='top') cam.position.set(0,0,5);       // XY投影
  else cam.position.set(0,-5,0);                 // XZ投影
  cam.lookAt(0,0,0);
  renderer.render(scene,cam);

  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d', {willReadFrequently:true});
  ctx.drawImage(renderer.domElement,0,0);
  renderer.dispose();

  // アルファ境界から輪郭線を作る
  const img=ctx.getImageData(0,0,W,H);
  const out=ctx.createImageData(W,H);
  const d=img.data, od=out.data;
  for(let y=1;y<H-1;y++){
    for(let x=1;x<W-1;x++){
      const i=(y*W+x)*4;
      const a=d[i+3];
      if(a<20) continue;
      const edge = d[i-4+3]<20 || d[i+4+3]<20 || d[i-W*4+3]<20 || d[i+W*4+3]<20;
      if(edge){ od[i]=0; od[i+1]=255; od[i+2]=136; od[i+3]=255; }
    }
  }
  ctx.clearRect(0,0,W,H);
  ctx.putImageData(out,0,0);
  return c;
}

function loop(){
  resize();
  drawOverlay();
  if(running && silhouettes[currentView] && video.readyState>=2){
    const score = matchFrame(silhouettes[currentView]);
    scoreEl.textContent = Math.round(score*100) + '%';
    if(score >= threshold && performance.now()-lastOkTime > 1800){
      handleOK(score);
    }
  }
  requestAnimationFrame(loop);
}

function drawOverlay(){
  const W=overlay.width,H=overlay.height;
  octx.clearRect(0,0,W,H);
  const sil = silhouettes[currentView];
  if(!sil) return;
  const s = Math.min(W,H)*0.72;
  const x=(W-s)/2, y=(H-s)/2;
  octx.save();
  octx.globalAlpha=0.78;
  octx.drawImage(sil,x,y,s,s);
  octx.restore();
  // 中央ガイド
  octx.strokeStyle='rgba(255,255,255,.35)'; octx.lineWidth=2*devicePixelRatio;
  octx.setLineDash([8*devicePixelRatio,8*devicePixelRatio]);
  octx.strokeRect(x,y,s,s);
  octx.setLineDash([]);
}

function matchFrame(sil){
  // PoC簡易：カメラ中心領域のエッジ量とCAD線の重なりを評価
  wctx.clearRect(0,0,work.width,work.height);
  wctx.drawImage(video,0,0,work.width,work.height);
  const v = wctx.getImageData(0,0,work.width,work.height);

  const sc=document.createElement('canvas'); sc.width=work.width; sc.height=work.height;
  const sctx=sc.getContext('2d',{willReadFrequently:true});
  sctx.drawImage(sil,0,0,work.width,work.height);
  const sdata=sctx.getImageData(0,0,work.width,work.height).data;

  const d=v.data;
  let hit=0,total=0;
  for(let y=1;y<work.height-1;y+=2){
    for(let x=1;x<work.width-1;x+=2){
      const i=(y*work.width+x)*4;
      if(sdata[i+3] < 80) continue;
      total++;
      const gx = Math.abs(d[i+4]-d[i-4]) + Math.abs(d[i+5]-d[i-3]) + Math.abs(d[i+6]-d[i-2]);
      const gy = Math.abs(d[i+work.width*4]-d[i-work.width*4]) + Math.abs(d[i+work.width*4+1]-d[i-work.width*4+1]) + Math.abs(d[i+work.width*4+2]-d[i-work.width*4+2]);
      if(gx+gy > 90) hit++;
    }
  }
  if(total===0) return 0;
  const raw = hit/total;
  // 見た目用に少し伸ばす
  return Math.min(1, raw*2.2);
}

function handleOK(score){
  lastOkTime = performance.now();
  if(currentView==='top' && !topOK){
    topOK=true; topState.textContent='OK';
    flash('上面 OK','ok');
    setTimeout(()=>switchView('side'),900);
  }else if(currentView==='side' && !sideOK){
    sideOK=true; sideState.textContent='OK';
    flash('最終 OK','ok');
    setPhase('検査完了','ok');
  }
}

function flash(text, cls){
  big.textContent=text; big.className=cls;
  setTimeout(()=>{big.className=''; big.textContent='';},750);
}

</script>
</body>
</html>

<!doctype html>
<html lang="ja"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ぴろえんす Inspect v8 GAS</title><style>
:root{--bg:#071225;--card:#101c34;--line:#29436d;--txt:#eef6ff;--muted:#9fb4d9;--cyan:#35dcff;--green:#35f078;--red:#ff4b5f;--yellow:#ffd84d}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#071225,#111b34);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}header{padding:12px 16px;border-bottom:1px solid #20375f;background:#081226cc;position:sticky;top:0;z-index:5}h1{font-size:19px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}main{display:grid;grid-template-columns:330px 1fr;gap:12px;padding:12px;max-width:1500px;margin:auto}.card{background:rgba(16,28,52,.94);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 12px 30px #0005}label{display:block;font-size:12px;color:#c8d8fa;margin:10px 0 5px}input,select{width:100%;padding:8px;border-radius:10px;border:1px solid #31517e;background:#071226;color:var(--txt)}button{width:100%;border:0;border-radius:11px;padding:11px 12px;margin-top:9px;background:linear-gradient(90deg,#2aa7ff,#39e0ff);font-weight:800;color:#001225;cursor:pointer}button.secondary{background:#26395f;color:#eef6ff}button.danger{background:#62283a;color:white}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#020711;border:1px solid #27436f;border-radius:12px;padding:9px}.box h3{font-size:13px;margin:0 0 6px}.box canvas{width:100%;height:auto;background:#111;border-radius:8px;display:block}.big{grid-column:1/-1}.status{font-size:12px;color:#c6d8ff;white-space:pre-line;line-height:1.45;margin-top:10px}.roiList{margin-top:10px;border-top:1px solid #2a416b;padding-top:8px;max-height:220px;overflow:auto}.roiItem{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #20375f;padding:6px 0;font-size:12px}.decision{font-size:76px;font-weight:1000;text-align:center;border-radius:16px;padding:18px 12px;margin-bottom:10px;letter-spacing:.10em;line-height:1}.decision::before{content:"総合判定";display:block;font-size:14px;letter-spacing:.12em;margin-bottom:8px;color:#c8d8fa}.decision.wait{background:#26395f;color:#dce8ff;border:2px solid #405b8d}.decision.ok{background:#0f3d25;color:#35f078;border:3px solid #35f078}.decision.ng{background:#451520;color:#ff4b5f;border:3px solid #ff4b5f}.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}.metric{background:#071226;border:1px solid #29436d;border-radius:10px;padding:9px;text-align:center}.metric b{display:block;font-size:22px}.metric small{color:#aabde0}.on{outline:2px solid var(--yellow);background:#ffd84d!important;color:#111!important}@media(max-width:900px){main{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}.decision{font-size:52px}}
</style></head>
<body>
<header><h1>ぴろえんす Inspect v8 / iPhone検査</h1><div class="sub">iPhone用。スプレッドシートからマスターを読み込み、撮影画像を検査します。</div></header>
<main>
<section class="card">
<label>GAS URL</label><input id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
<button class="secondary" onclick="saveGasUrl();loadParts()">GAS URL保存＋品番読込</button>
<label>品番</label><select id="partSelect"></select>
<button id="loadPartBtn">選択品番を読み込み</button>
<label>検査画像 / カメラ撮影</label><input id="inspectFile" type="file" accept="image/*" capture="environment">
<button id="runBtn">RANSAC + 検査</button>
<label>輪郭/エッジしきい値</label><input id="edgeThr" type="range" min="40" max="220" value="100">
<label>差分許容px</label><input id="tol" type="range" min="1" max="20" value="6">
<label>最大処理幅px</label><input id="maxW" type="range" min="300" max="1200" value="700" step="50">
<label>特徴点数</label><input id="features" type="range" min="300" max="3000" value="1500" step="100">
<label>位置合わせ 最小一致点数</label><input id="minInliers" type="range" min="5" max="100" value="30" step="5">
<label>位置合わせ 最小一致率%</label><input id="minInlierRatio" type="range" min="10" max="95" value="60" step="5">
<label>倍率ガード</label><select id="scaleGuard"><option value="0.80-1.25">0.80 - 1.25</option><option value="0.90-1.10">0.90 - 1.10</option><option value="0.70-1.40">0.70 - 1.40</option><option value="off">OFF</option></select>
<div id="status" class="status">OpenCV.js読み込み待ち...</div>
<div id="pointList" class="roiList"></div>
</section>
<section class="card">
<div id="decision" class="decision wait">WAIT</div>
<div class="metrics">
<div class="metric"><small>方式</small><b id="method">--</b></div>
<div class="metric"><small>検査ポイント</small><b id="roiScore">--</b></div>
<div class="metric"><small>外形差異率</small><b id="missingScore">--</b></div>
<div class="metric"><small>倍率</small><b id="scaleScore">--</b></div>
<div class="metric"><small>位置合わせ</small><b id="matchScore">--</b></div>
</div>
<div class="grid">
<div class="box"><h3>マスター</h3><canvas id="masterCanvas" width="640" height="420"></canvas></div>
<div class="box"><h3>検査画像</h3><canvas id="inspectCanvas" width="640" height="420"></canvas></div>
<div class="box"><h3>特徴点マッチ</h3><canvas id="matchCanvas" width="640" height="420"></canvas></div>
<div class="box"><h3>射影補正後</h3><canvas id="warpCanvas" width="640" height="420"></canvas></div>
<div class="box big"><h3>検査ポイント差異結果</h3><canvas id="resultCanvas" width="1100" height="620"></canvas></div>
</div>
</section>
</main>
<script async src="https://docs.opencv.org/4.9.0/opencv.js" onload="cvReady()"></script>
<script>

const $=id=>document.getElementById(id);
function log(s){$('status').textContent=s}
function getGasUrl(){return ($('gasUrl')?.value || localStorage.getItem('PIROENS_GAS_URL') || '').trim()}
function saveGasUrl(){const u=getGasUrl(); if(u) localStorage.setItem('PIROENS_GAS_URL',u);}
function loadImage(file){return new Promise((res,rej)=>{const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=URL.createObjectURL(file);})}
function dataUrlToImage(dataUrl){return new Promise((res,rej)=>{const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=dataUrl;})}
function compressImage(img,maxW=700,quality=0.55){const scale=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);const x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',quality)}
function drawImageFit(canvas,img,drawFn){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);if(!img)return;const r=Math.min(canvas.width/img.width,canvas.height/img.height),w=img.width*r,h=img.height*r,ox=(canvas.width-w)/2,oy=(canvas.height-h)/2;ctx.drawImage(img,ox,oy,w,h);if(drawFn)drawFn(ctx,canvas,img)}
function fitParams(canvas,img){const r=Math.min(canvas.width/img.width,canvas.height/img.height),w=img.width*r,h=img.height*r,ox=(canvas.width-w)/2,oy=(canvas.height-h)/2;return{r,ox,oy,w,h}}
function eventToImg(canvas,e,img){const rect=canvas.getBoundingClientRect();const x=(e.clientX-rect.left)*canvas.width/rect.width,y=(e.clientY-rect.top)*canvas.height/rect.height;const f=fitParams(canvas,img);return{x:(x-f.ox)/f.r,y:(y-f.oy)/f.r}}
function setDecision(t,cls){const d=$('decision');if(!d)return;d.className='decision '+cls;d.textContent=t}
function renderPointList(points, listId='pointList'){const el=$(listId); if(!el)return; el.innerHTML='<b>検査ポイント: '+points.length+'件</b>'+points.map((r,i)=>`<div class="roiItem"><span>${i+1}. ${r.name}<br><small>${r.type==='absent'?'ないこと確認':'あること確認'} / 差異NG ${r.threshold ?? 12}%</small></span><button class="danger" data-del="${i}">削除</button></div>`).join(''); el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{points.splice(+b.dataset.del,1); renderPointList(points); if(typeof redrawMaster==='function')redrawMaster();});}


let cvLoaded=false;
function cvReady(){cv['onRuntimeInitialized']=()=>{cvLoaded=true;log('OpenCV.js 読込OK')};}
function matFromImage(img,maxW){const scale=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);const x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);let src=cv.imread(c);let gray=new cv.Mat();cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);return{src,gray,scale,w:c.width,h:c.height,canvas:c}}
function edgeMask(gray,edgeThr){let blur=new cv.Mat(),edges=new cv.Mat();cv.GaussianBlur(gray,blur,new cv.Size(3,3),0);cv.Canny(blur,edges,edgeThr,edgeThr*2);blur.delete();return edges}
function detectAndMatch(m,i,features){let orb=new cv.ORB(features);let kp1=new cv.KeyPointVector(),kp2=new cv.KeyPointVector(),des1=new cv.Mat(),des2=new cv.Mat();orb.detectAndCompute(m.gray,new cv.Mat(),kp1,des1);orb.detectAndCompute(i.gray,new cv.Mat(),kp2,des2);if(des1.empty()||des2.empty())throw new Error('特徴点が少なすぎます');let matcher=new cv.BFMatcher(cv.NORM_HAMMING,true);let matches=new cv.DMatchVector();matcher.match(des1,des2,matches);let arr=[];for(let k=0;k<matches.size();k++)arr.push(matches.get(k));arr.sort((a,b)=>a.distance-b.distance);arr=arr.slice(0,Math.min(120,arr.length));let srcPts=[],dstPts=[];for(const mt of arr){let p1=kp1.get(mt.queryIdx).pt,p2=kp2.get(mt.trainIdx).pt;srcPts.push(p1.x,p1.y);dstPts.push(p2.x,p2.y)}let srcMat=cv.matFromArray(arr.length,1,cv.CV_32FC2,srcPts);let dstMat=cv.matFromArray(arr.length,1,cv.CV_32FC2,dstPts);let mask=new cv.Mat();let H=cv.findHomography(dstMat,srcMat,cv.RANSAC,5,mask);let inliers=0;for(let k=0;k<mask.rows;k++)if(mask.data[k])inliers++;drawMatches(m,i,kp1,kp2,arr,mask);orb.delete();kp1.delete();kp2.delete();des1.delete();des2.delete();matcher.delete();matches.delete();srcMat.delete();dstMat.delete();mask.delete();if(H.empty())throw new Error('Homography推定失敗');return{H,inliers,total:arr.length}}
function drawMatches(m,i,kp1,kp2,matches,mask){const c=$('matchCanvas'); if(!c)return; const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#111';ctx.fillRect(0,0,c.width,c.height);const half=c.width/2;ctx.drawImage(m.canvas,0,0,half,c.height);ctx.drawImage(i.canvas,half,0,half,c.height);const sx1=half/m.w,sy1=c.height/m.h,sx2=half/i.w,sy2=c.height/i.h;ctx.lineWidth=1;matches.forEach((mt,idx)=>{let p1=kp1.get(mt.queryIdx).pt,p2=kp2.get(mt.trainIdx).pt;let ok=mask.data[idx];ctx.strokeStyle=ok?'#38f078':'rgba(255,75,95,.35)';ctx.beginPath();ctx.moveTo(p1.x*sx1,p1.y*sy1);ctx.lineTo(half+p2.x*sx2,p2.y*sy2);ctx.stroke()})}
function homographyScale(H){let d=H.data64F||H.data32F;let a=d[0],b=d[1],c=d[3],e=d[4];return Math.sqrt(Math.abs(a*e-b*c))}
function drawMatToCanvas(canvas,mat){let c=document.createElement('canvas');cv.imshow(c,mat);let ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(c,0,0,canvas.width,canvas.height)}
function hasNearbyEdge(edge, x, y, w, h, tol){
  for(let dy=-tol;dy<=tol;dy++){
    for(let dx=-tol;dx<=tol;dx++){
      let nx=x+dx, ny=y+dy;
      if(nx>=0&&ny>=0&&nx<w&&ny<h&&edge.ucharPtr(ny,nx)[0]) return true;
    }
  }
  return false;
}
function comparePoints(m,warped,points,params){
  let wGray=new cv.Mat(); cv.cvtColor(warped,wGray,cv.COLOR_RGBA2GRAY);
  let mEdge=edgeMask(m.gray,params.edgeThr), wEdge=edgeMask(wGray,params.edgeThr);
  let result=$('resultCanvas'),ctx=result.getContext('2d');
  ctx.clearRect(0,0,result.width,result.height); ctx.fillStyle='#111';ctx.fillRect(0,0,result.width,result.height);
  let tmp=document.createElement('canvas');cv.imshow(tmp,warped);
  const r=Math.min(result.width/m.w,result.height/m.h),ox=(result.width-m.w*r)/2,oy=(result.height-m.h*r)/2;
  ctx.drawImage(tmp,ox,oy,m.w*r,m.h*r);
  let okCount=0,maxDiff=0, details=[];
  ctx.save();ctx.translate(ox,oy);ctx.scale(r,r);
  points.forEach(roi=>{
    let x=Math.max(0,Math.round(roi.x*m.scale)),y=Math.max(0,Math.round(roi.y*m.scale)),w=Math.min(m.w-x,Math.round(roi.w*m.scale)),h=Math.min(m.h-y,Math.round(roi.h*m.scale));
    let mode=roi.type||'present', thr=(roi.threshold ?? params.roiThr)/100;
    let mismatch=0, denom=0, diff=0, ok=false;
    if(mode==='present'){
      for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)if(mEdge.ucharPtr(yy,xx)[0]){denom++; if(!hasNearbyEdge(wEdge,xx,yy,m.w,m.h,params.tol)) mismatch++;}
      diff=denom?mismatch/denom:1; ok=diff<=thr;
    }else{
      for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)if(wEdge.ucharPtr(yy,xx)[0]){denom++; if(!hasNearbyEdge(mEdge,xx,yy,m.w,m.h,params.tol)) mismatch++;}
      diff=denom?mismatch/denom:0; ok=diff<=thr;
    }
    maxDiff=Math.max(maxDiff,diff); if(ok) okCount++;
    ctx.strokeStyle=ok?'#35f078':'#ff4b5f';ctx.lineWidth=4/r;ctx.strokeRect(x,y,w,h);
    ctx.fillStyle=ctx.strokeStyle;ctx.font=`${18/r}px sans-serif`;ctx.fillText(`${roi.name} 差異${(diff*100).toFixed(1)}%`,x,y-8);
    details.push({...roi,diff,ok});
  });
  ctx.restore(); mEdge.delete();wEdge.delete();wGray.delete();
  return{ok:okCount,allOk:okCount===points.length,maxDiff,details};
}

let masterImg=null, inspectImg=null, points=[], currentPart=null;
$('gasUrl').value=localStorage.getItem('PIROENS_GAS_URL')||'';
$('inspectFile').onchange=async e=>{inspectImg=await loadImage(e.target.files[0]); drawImageFit($('inspectCanvas'),inspectImg); log('検査画像読込OK');};
$('loadPartBtn').onclick=loadSelectedPart;
$('runBtn').onclick=runInspect;
async function loadParts(){
 const gas=getGasUrl(); if(!gas){alert('GAS URLを入れて');return}
 log('品番一覧読込中...');
 const res=await fetch(gas+'?action=list'); const js=await res.json();
 if(!js.ok) throw new Error(js.error||'list失敗');
 $('partSelect').innerHTML=js.parts.map(p=>`<option value="${p.partNo}">${p.partNo} ${p.memo?'- '+p.memo:''}</option>`).join('');
 log('品番一覧OK: '+js.parts.length+'件');
}
async function loadSelectedPart(){
 const gas=getGasUrl(); const partNo=$('partSelect').value; if(!gas||!partNo){alert('GAS URLと品番を確認');return}
 log('マスター読込中...');
 const res=await fetch(gas+'?action=get&partNo='+encodeURIComponent(partNo)); const js=await res.json();
 if(!js.ok) throw new Error(js.error||'get失敗');
 currentPart=js.part; points=currentPart.points||[];
 masterImg=await dataUrlToImage(currentPart.topData);
 drawImageFit($('masterCanvas'),masterImg,(ctx,canvas,img)=>{const f=fitParams(canvas,img);ctx.save();ctx.translate(f.ox,f.oy);ctx.scale(f.r,f.r);ctx.strokeStyle='#ffd84d';ctx.lineWidth=4/f.r;points.forEach(p=>ctx.strokeRect(p.x,p.y,p.w,p.h));ctx.restore();});
 renderPointList(points);
 log('マスター読込OK: '+partNo+' / 検査ポイント '+points.length+'件');
}
function renderPointListForResult(details){const el=$('pointList'); el.innerHTML='<b>検査ポイント結果</b>'+details.map((r,i)=>`<div class="roiItem"><span>${i+1}. ${r.name}<br><small>${r.type==='absent'?'ないこと確認':'あること確認'} / 差異 ${(r.diff*100).toFixed(1)}%</small></span><b style="color:${r.ok?'#35f078':'#ff4b5f'}">${r.ok?'OK':'NG'}</b></div>`).join('');}
function runInspect(){
 if(!cvLoaded){alert('OpenCV.js読み込み中');return}
 if(!masterImg||!inspectImg){alert('マスターと検査画像を読み込んで');return}
 try{
  setDecision('WAIT','wait');
  let params={edgeThr:+$('edgeThr').value,tol:+$('tol').value,roiThr:12};
  let m=matFromImage(masterImg,+$('maxW').value), i=matFromImage(inspectImg,+$('maxW').value);
  let {H,inliers,total}=detectAndMatch(m,i,+$('features').value);
  let warped=new cv.Mat();cv.warpPerspective(i.src,warped,H,new cv.Size(m.w,m.h));drawMatToCanvas($('warpCanvas'),warped);
  let scale=homographyScale(H);let [smin,smax]=$('scaleGuard').value==='off'?[0,999]:$('scaleGuard').value.split('-').map(Number);
  let scaleOk=scale>=smin&&scale<=smax;
  let minIn=+$('minInliers').value, minRatio=+$('minInlierRatio').value/100;
  let alignOk=inliers>=minIn && (inliers/Math.max(1,total))>=minRatio && scaleOk;
  let res=comparePoints(m,warped,points,params);
  $('method').textContent='RANSAC';$('matchScore').textContent=`${inliers}/${total}`;$('scaleScore').textContent=scale.toFixed(3);$('roiScore').textContent=res.ok+'/'+points.length;$('missingScore').textContent=(res.maxDiff*100).toFixed(1)+'%';
  renderPointListForResult(res.details);
  let outerOk=(res.outerDiff||0)<=((params.outerThr||6)/100); let pointsOk=(points.length===0)||res.allOk; let ok=alignOk && outerOk && pointsOk; setDecision(ok?'OK':'NG',ok?'ok':'ng');
  log(`解析完了\n位置合わせ=${alignOk?'OK':'NG'} / inlier=${inliers}/${total} / scale=${scale.toFixed(3)}\n検査ポイント=${res.ok}/${points.length}`);
  m.src.delete();m.gray.delete();i.src.delete();i.gray.delete();H.delete();warped.delete();
 }catch(e){console.error(e);setDecision('NG','ng');log('解析エラー: '+e.message)}
}
</script></body></html>
